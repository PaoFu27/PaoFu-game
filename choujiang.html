<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三合一抽奖页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe6f2, #fff0f8);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 35px;
            flex-wrap: nowrap;
            padding: 30px 0;
            width: 100%;
            max-width: 100%;
        }

        .left-box {
            width: 300px;
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px #ffc8e080;
            flex-shrink: 0;
        }

        .center-box {
            width: 400px;
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px #ffc8e080;
            text-align: center;
            flex-shrink: 0;
        }

        .right-box {
            width: 300px;
            height: 550px;
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px #ffc8e080;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        /* 左侧挑战分块样式 */
        .challenge-item {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #ffc8e0;
        }
        .challenge-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .challenge-title {
            font-size: 15px;
            color: #ff5f9a;
            font-weight: bold;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .challenge-title span {
            display: inline-block;
            width: 20px;
            height: 20px;
            line-height: 20px;
            background: #ff6b9c;
            color: #fff;
            border-radius: 50%;
            text-align: center;
            font-size: 12px;
        }

        h4 {
            color: #ff6b9c;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .wheel-box {
            width: 280px;
            height: 280px;
            margin: 0 auto 25px;
            position: relative;
        }
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #ff99bb;
            transition: all 4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .pointer {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 28px solid #ff4477;
            z-index: 99;
        }
        .btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #ff6b9c;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px #ff6b9c70;
            margin-top: -185px;
            position: relative;
        }
        .btn:active {
            scale: 0.95;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            scale: 1;
        }
        .count-text,.res-text {
            font-size: 17px;
            color: #d6336c;
            margin: 12px 0;
            font-weight: bold;
        }

        .code-wrap {
            margin: 10px 0 0;
        }
        .code-wrap input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ffc2e0;
            border-radius: 6px;
            outline: none;
            margin-bottom: 8px;
        }
        .code-wrap button,.game-btn {
            width: 100%;
            padding: 9px;
            border: none;
            background: #ff6b9c;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .game-btn {
            background: #ff8fbf;
            margin: 0;
        }
        .tip-text {
            font-size: 12px;
            margin-top: 6px;
            color: #555;
        }

        .record-list {
            flex: 1;
            overflow-y: auto;
            font-size: 14px;
            color: #c72c5e;
        }
        .record-item {
            padding: 6px 0;
            border-bottom: 1px solid #ffe6f2;
        }

        /* 停表挑战专用样式 */
.stop-bar-box{
    width:100%;
    height:28px;
    background:#fce4ec;
    border-radius:14px;
    margin:10px 0;
    position:relative;
    overflow:hidden;
}
.stop-target{
    position:absolute;
    left:65%;
    width:8%;
    height:100%;
    background:#a5e9cb;
    z-index:1;
}
.stop-runner{
    position:absolute;
    left:0;
    top:0;
    width:12px;
    height:100%;
    background:#ff4477;
    z-index:2;
    border-radius:6px;
}

        #fireworks {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .popup-mask{
            position: fixed;
            inset: 0;
            background: rgba(255,192,220,.45);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .popup-box{
            width: 360px;
            background: linear-gradient(180deg,#fff0f7,#fff);
            border-radius: 26px;
            padding: 38px 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255,120,170,.28);
            animation: popIn .5s ease;
            position: relative;
            overflow: hidden;
        }
        @keyframes popIn{
            from{transform: scale(.6);opacity:0;}
            to{transform: scale(1);opacity:1;}
        }
        .float-heart{
            position: absolute;
            bottom: -30px;
            color: #ff8fbf;
            animation: floatUp 6s linear infinite;
        }
        @keyframes floatUp{
            0%{transform: translateY(0) scale(.5);opacity:0;}
            20%{opacity:1;}
            100%{transform: translateY(-430px) scale(1.2);opacity:0;}
        }
    </style>
</head>
<body>

<!-- 左侧：挑战1 + 挑战2 + 挑战3 清晰分块 -->
<div class="left-box">
    <h4>✅ 完成挑战 +1 抽奖次数</h4>

    <!-- 挑战1：邀请码兑换 -->
    <div class="challenge-item">
        <div class="challenge-title"><span>1</span> 挑战一：输入专属邀请码</div>
        <div class="code-wrap">
            <input type="text" id="codeInput" placeholder="请输入邀请码">
            <button onclick="checkInviteCode()">确认兑换</button>
            <div id="codeTip" class="tip-text"></div>
        </div>
    </div>

    <!-- 挑战2：10秒极速点击 -->
    <div class="challenge-item">
        <div class="challenge-title"><span>2</span> 挑战二：10秒极速点击</div>
        <button id="clickGameBtn" class="game-btn" onclick="startClickGame()">开始挑战</button>
        <span id="timeTip" style="margin-left:0px;color:#d6336c;font-weight:bold;display:block;margin-top:8px;"></span>
        <div id="clickTip" class="tip-text"></div>
    </div>

    <!-- 挑战3：停表挑战（新增） -->
    <div class="challenge-item">
        <div class="challenge-title"><span>3</span> 挑战三：停表挑战</div>
        <div class="stop-bar-box">
            <div class="stop-target"></div>
            <div class="stop-runner" id="stopRunner"></div>
        </div>
        <button id="stopBtn" class="game-btn" onclick="startStopGame()">开始挑战</button>
        <span id="stopTip" style="display:block;margin-top:8px;font-size:12px;color:#555;"></span>
    </div>
</div>

<div class="center-box">
    <h2>专属幸运抽奖</h2>
    <div class="count-text">剩余次数：<span id="countTip">2</span> 次</div>

    <div class="wheel-box">
        <div class="pointer"></div>
        <canvas id="wheel"></canvas>
    </div>
    <button class="btn" id="startBtn">开始<br>抽奖</button>

    <div class="res-text" id="resText"></div>
</div>

<div class="right-box">
    <h4>🎁 已抽到的礼物</h4>
    <div class="record-list" id="recordList"></div>
</div>

<div class="popup-mask" id="popupMask">
    <canvas id="fireworks"></canvas>
    <div class="popup-box">
        <div class="bubble-area" id="bubbleArea"></div>
        <h2 style="color:#ff5f9a;margin-bottom:18px;">💖 泡芙太棒啦</h2>
        <p style="color:#ff6fa8;font-size:14px;line-height:1.8;margin-bottom:25px;">
            成功救出了小黄<br>接下来是抽奖环节~
        </p>
        <button onclick="closePopup()" style="border:none;background:linear-gradient(135deg,#ff7eb3,#ff5f9a);color:#fff;padding:12px 26px;border-radius:99px;cursor:pointer;font-size:15px;">
            开始抽奖 ✨
        </button>
    </div>
</div>

<script>
    const prizeList = [
        "超级抱抱一个",
        "免费奶茶一杯",
        "免生气特权一天",
        "甜蜜亲亲×3",
        "专属约会一日游",
        "全程陪伴服务",
        "随心点餐特权",
        "专属夸夸套餐"
    ];
    const colorList = ["#ffd6e7","#ffeaf4","#ffcfe0","#ffe3f0","#ffd2e5","#ffe8f2","#ffcce2","#ffd9eb"];

    let count = 2;
    const len = prizeList.length;
    const wheelCanvas = document.getElementById("wheel");
    const ctx = wheelCanvas.getContext("2d");
    wheelCanvas.width = 280;
    wheelCanvas.height = 280;
    const startBtn = document.getElementById("startBtn");
    const resText = document.getElementById("resText");
    const countTip = document.getElementById("countTip");
    const recordList = document.getElementById("recordList");
    const itemAngle = 360 / len;

    function drawWheel(){
        const r = 140;
        ctx.clearRect(0,0,280,280);
        for(let i = 0; i < len; i++){
            let start = (i * itemAngle - 90) * Math.PI / 180;
            let end = ((i+1) * itemAngle - 90) * Math.PI / 180;
            ctx.beginPath();
            ctx.moveTo(r,r);
            ctx.arc(r,r,r,start,end);
            ctx.closePath();
            ctx.fillStyle = colorList[i];
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.save();
            ctx.translate(r,r);
            let angle = start + (end - start)/2;
            ctx.rotate(angle);
            ctx.fillStyle = "#c72c5e";
            ctx.font = "13px 微软雅黑";
            ctx.textAlign = "center";
            ctx.fillText(prizeList[i],90,6);
            ctx.restore();
        }
    }
    drawWheel();

    // ====================== 精准抽奖逻辑（完美版）======================
    startBtn.onclick = function(){
        if(count <= 0){
            resText.innerText = "❌ 次数不足，完成挑战获取次数";
            return;
        }
        startBtn.disabled = true;
        resText.innerText = "抽奖中～";
        count--;
        countTip.innerText = count;

        wheelCanvas.style.transition = "none";
        wheelCanvas.style.transform = "rotate(0deg)";

        setTimeout(()=>{
            const randomIndex = Math.floor(Math.random() * len);
            const rotateTo = 360 * 8 - (randomIndex * itemAngle + itemAngle/2);
            
            wheelCanvas.style.transition = "all 4s cubic-bezier(0.2, 0.8, 0.2, 1)";
            wheelCanvas.style.transform = `rotate(${rotateTo}deg)`;

            setTimeout(()=>{
                const win = prizeList[randomIndex];
                resText.innerText = `🎉恭喜中奖：${win}`;
                recordList.innerHTML = `<div class="record-item">${win}</div>` + recordList.innerHTML;
                startBtn.disabled = false;
            },4000);
        },30);
    }
    // ==================================================================

    function addCount(){
        count++;
        countTip.innerText = count;
    }

    // ====================== 挑战1：邀请码 ======================
    let codeCanGet = true;
    const rightCode = "JK6S25BT8N";
    function checkInviteCode(){
        const tip = document.getElementById("codeTip");
        if(!codeCanGet){
            tip.innerText = "❌ 已兑换，不可重复领取";
            tip.style.color = "#f00";
            return;
        }
        let val = document.getElementById("codeInput").value.trim();
        if(val === rightCode){
            addCount();
            codeCanGet = false;
            tip.innerText = "✅ 邀请码正确，次数+1";
            tip.style.color = "#27ae60";
        }else{
            tip.innerText = "❌ 邀请码错误";
            tip.style.color = "#f00";
        }
    }

   // ====================== 挑战2：点击挑战（修复：失败可重试5次）======================
let clickCanGet = true;
let clickCount = 0, clickTimer = null, timeLeft = 10;
let clickAttempts = 0;
const clickMaxAttempt = 5;

function startClickGame(){
    const btn = document.getElementById("clickGameBtn");
    const timeTipDom = document.getElementById("timeTip");
    const clickTipDom = document.getElementById("clickTip");

    // 成功过直接禁止
    if(!clickCanGet){
        clickTipDom.innerText = "❌ 挑战已完成，不可再玩";
        clickTipDom.style.color = "#27ae60";
        return;
    }
    // 次数用完禁止
    if(clickAttempts >= clickMaxAttempt){
        clickTipDom.innerText = "❌ 5次机会已用完";
        clickTipDom.style.color = "#f00";
        return;
    }

    clickCount = 0;
    timeLeft = 10;
    btn.innerText = "疯狂点击我";
    clickTipDom.innerText = "";
    timeTipDom.innerText = `剩余：${timeLeft}s`;

    clickTimer = setInterval(()=>{
        timeLeft--;
        timeTipDom.innerText = `剩余：${timeLeft}s`;
        if(timeLeft <= 0){
            clearInterval(clickTimer);
            clickAttempts++;

            if(clickCount >= 60){
                addCount();
                clickCanGet = false;
                clickTipDom.innerText = `✅ 成功！点击${clickCount}次`;
                clickTipDom.style.color = "#27ae60";
                btn.innerText = "开始挑战";
            }else{
                if(clickAttempts >= clickMaxAttempt){
                    clickTipDom.innerText = `❌ 失败${clickCount}次，5次机会已用完`;
                    clickTipDom.style.color = "#f00";
                }else{
                    clickTipDom.innerText = `❌ 仅${clickCount}次，还可再挑战${clickMaxAttempt - clickAttempts}次`;
                    clickTipDom.style.color = "#f00";
                }
                btn.innerText = "开始挑战";
            }
        }
    },1000);

    btn.onclick = function(){
        if(timeLeft > 0) clickCount++;
    }
}

    // ====================== 挑战3：停表挑战（修复失败后按钮卡死 + 5次重试）======================
let stopCanGet = true;
let stopAttempts = 0;
const maxAttempts = 5;
let stopRunning = false;
let stopPos = 0;
let stopInterval;
const runner = document.getElementById("stopRunner");
const stopBtn = document.getElementById("stopBtn");
const stopTip = document.getElementById("stopTip");

function startStopGame(){
    // 成功过直接禁止
    if(!stopCanGet){
        stopTip.innerText = "✅ 已完成挑战，不可再玩";
        stopTip.style.color = "#27ae60";
        return;
    }
    // 次数用完
    if(stopAttempts >= maxAttempts){
        stopTip.innerText = "❌ 5次机会已用完，挑战结束";
        stopTip.style.color = "#f00";
        return;
    }
    // 防止同时运行
    if(stopRunning) return;

    stopBtn.innerText = "点击停下";
    stopTip.innerText = `剩余机会：${maxAttempts - stopAttempts} 次`;
    stopRunning = true;
    stopPos = 0;

    stopInterval = setInterval(()=>{
        stopPos += 6;
        if(stopPos > 100) stopPos = 0;
        runner.style.left = stopPos + "%";
    },20);

    // 停下逻辑
    stopBtn.onclick = function(){
        if(!stopRunning) return;
        
        clearInterval(stopInterval);
        stopRunning = false;
        stopAttempts++;
        stopBtn.innerText = "开始挑战";

        // 匹配窄绿色区间 65 ~ 73
        if(stopPos >= 65 && stopPos <= 73){
            addCount();
            stopCanGet = false;
            stopTip.innerText = "✅ 完美命中！次数+1";
            stopTip.style.color = "#27ae60";
        }else{
            if(stopAttempts >= maxAttempts){
                stopTip.innerText = "❌ 5次机会已用完";
                stopTip.style.color = "#f00";
            }else{
                stopTip.innerText = `❌ 未命中，剩余机会：${maxAttempts - stopAttempts}`;
                stopTip.style.color = "#f00";
            }
        }
    }
}

    // ====================== 弹窗 & 特效 ======================
    function closePopup(){
        document.getElementById("popupMask").style.display = "none";
    }

    const fireCanvas = document.getElementById("fireworks");
    const fctx = fireCanvas.getContext("2d");
    fireCanvas.width = window.innerWidth;
    fireCanvas.height = window.innerHeight;
    let particles = [];

    class PixelHeart{
        constructor(x,y,c){
            this.x=x;this.y=y;this.size=Math.random()*8+6;
            this.color=c;this.speedX=(Math.random()-0.5)*6;
            this.speedY=(Math.random()-0.5)*6;this.alpha=1;
            this.rot=0;
        }
        update(){
            this.x+=this.speedX;this.y+=this.speedY;
            this.alpha-=0.007;this.rot+=0.5;
        }
        draw(){
            fctx.save();
            fctx.translate(this.x,this.y);
            fctx.rotate(this.rot*Math.PI/180);
            fctx.globalAlpha=this.alpha;
            fctx.strokeStyle=this.color;
            fctx.lineWidth=1.5;
            fctx.beginPath();
            let s=this.size;
            fctx.moveTo(0,0);
            fctx.bezierCurveTo(-s/2,-s/2,-s,s/3,0,s);
            fctx.bezierCurveTo(s,s/3,s/2,-s/2,0,0);
            fctx.stroke();
            fctx.restore();
        }
    }
    class Ribbon{
        constructor(x,y,c){
            this.x=x;this.y=y;this.w=Math.random()*4+2;
            this.h=Math.random()*25+10;this.color=c;
            this.speedX=(Math.random()-0.5)*8;this.speedY=(Math.random()-0.5)*8;
            this.alpha=1;this.rot=0;
        }
        update(){
            this.x+=this.speedX;this.y+=this.speedY;
            this.alpha-=0.008;this.rot+=2;
        }
        draw(){
            fctx.save();
            fctx.translate(this.x,this.y);
            fctx.rotate(this.rot*Math.PI/180);
            fctx.globalAlpha=this.alpha;
            fctx.fillStyle=this.color;
            fctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
            fctx.restore();
        }
    }
    function boom(){
        const colors=["#ff85c1","#ff6fa8","#ff9ecb","#ffd1e8","#73d9ff"];
        let x=Math.random()*fireCanvas.width;
        let y=Math.random()*fireCanvas.height*0.4;
        for(let i=0;i<10;i++) particles.push(new PixelHeart(x,y,colors[Math.floor(Math.random()*colors.length)]));
        for(let i=0;i<20;i++) particles.push(new Ribbon(x,y,colors[Math.floor(Math.random()*colors.length)]));
    }
    setInterval(boom,700);
    function animate(){
        fctx.clearRect(0,0,fireCanvas.width,fireCanvas.height);
        for(let i=particles.length-1;i>=0;i--){
            particles[i].update();
            particles[i].draw();
            if(particles[i].alpha<=0) particles.splice(i,1);
        }
        requestAnimationFrame(animate);
    }
    animate();

    window.onload = function(){
        const area = document.getElementById("bubbleArea");
        const heartArr = ['♡','❥','✦','♡'];
        for(let i=0;i<8;i++){
            let d = document.createElement("div");
            d.className = "float-heart";
            d.innerText = heartArr[i%heartArr.length];
            d.style.left = Math.random()*90+"%";
            d.style.animationDelay = Math.random()*3+"s";
            area.appendChild(d);
        }
    }
</script>
</body>
</html>
