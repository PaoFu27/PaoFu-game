<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属泡芙抽奖机 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe6f2, #fff0f8);
    padding: 20px;
    margin: 0;
}
        .box {
    position: absolute;
    left: 50%;
    top: 20px;
    transform: translateX(-65%);
    background: #fff;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 25px #ffc8e080;
    text-align: center;
    width: 400px;
}
.right-box {
    position: absolute;
    right: 50%;
    top: 20px;
    transform: translateX(65%);
    background: #fff;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 8px 25px #ffc8e080;
    width: 300px;
    height: 550px;
}
        h2 {
            color: #ff6b9c;
            margin-bottom: 20px;
        }
        .wheel-box {
            width: 280px;
            height: 280px;
            margin: 0 auto 25px;
            position: relative;
        }
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #ff99bb;
            transition: all 4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .pointer {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 28px solid #ff4477;
            z-index: 99;
            filter: drop-shadow(0 2px 3px #0002);
        }
        .btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #ff6b9c;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            cursor: pointer;
            box-shadow: 0 4px 12px #ff6b9c70;
        }
        .btn:active {
            scale: 0.95;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .count {
            font-size: 17px;
            color: #d6336c;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .result {
            font-size: 18px;
            color: #d6336c;
            min-height: 28px;
            font-weight: bold;
            margin-top: 15px;
        }
        .task-box {
            margin-top: 20px;
            text-align: left;
            background: #fff7fa;
            padding: 15px;
            border-radius: 12px;
        }
        .task-box h4 {
            color: #ff6b9c;
            margin-bottom: 10px;
        }
        .task {
            padding: 8px 10px;
            background: #ffd6e7;
            border-radius: 8px;
            margin: 6px 0;
            cursor: pointer;
            font-size: 14px;
        }
        .task:hover {
            background: #ffc2e0;
        }
        .record-title {
            color: #ff6b9c;
            margin-bottom: 15px;
            font-size: 18px;
            text-align: center;
        }
        .record-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        .record-item {
            background: #ffebf3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #c72c5e;
        }
        /* ================= 弹窗 ================= */
.popup-mask{
    position: fixed;
    inset: 0;
    background: rgba(255,192,220,.45);
    backdrop-filter: blur(5px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
.popup-box{
    width: 360px;
    max-width: 92%;
    background: linear-gradient(180deg,#fff0f7,#ffffff);
    border-radius: 26px;
    padding: 38px 25px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(255,120,170,.28);
    position: relative;
    overflow: hidden;
    animation: popIn .5s ease;
}
/* 像素风动画字体 */
.popup-box h2,
.popup-box p{
    font-family:
        "Press Start 2P",
        "ZCOOL KuaiLe",
        "Microsoft YaHei",
        sans-serif;
    letter-spacing: 1px;
}
.popup-box h2{
    color:#ff5f9a;
    font-size:24px;
    line-height:1.6;
    margin-bottom:18px;
    position:relative;
    z-index:2;
    text-shadow:
        2px 0 #ffd3e6,
        -2px 0 #ffd3e6,
        0 2px #ffd3e6,
        0 -2px #ffd3e6,
        3px 3px #ff9fc4;
    animation:
        pixelGlow 1.2s infinite alternate,
        floatText 2s ease-in-out infinite;
}
.popup-box p{
    color:#ff6fa8;
    font-size:14px;
    line-height:2;
    margin-bottom:25px;
    position:relative;
    z-index:2;
    text-shadow:
        1px 1px #ffd8ea,
        2px 2px #ffc3dd;
    animation: pixelGlowSoft 1.4s infinite alternate;
}
.popup-box button{
    border:none;
    background: linear-gradient(135deg,#ff7eb3,#ff5f9a);
    color:#fff;
    padding:12px 26px;
    border-radius:999px;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(255,105,160,.35);
    position:relative;
    z-index:2;
}
.popup-box button:hover{
    transform:scale(1.05);
}
/* 泡泡 + 像素线条爱心 */
.bubble-area span{
    position:absolute;
    bottom:-30px;
    background:rgba(255,170,210,.35);
    border-radius:50%;
    animation: floatUp linear infinite;
}
.bubble-area i{
    position:absolute;
    bottom:-30px;
    color:#ff8fbf;
    font-style:normal;
    animation: floatUp linear infinite;
    /* 像素线条爱心 */
    font-family: monospace;
    text-shadow: none;
}
/* 动画 */
@keyframes floatUp{
    0%{
        transform:translateY(0) scale(.5);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-430px) scale(1.2);
        opacity:0;
    }
}
@keyframes popIn{
    from{
        transform:scale(.6);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
@keyframes pixelGlow{
    from{
        transform:translateY(0);
        filter:brightness(1);
    }
    to{
        transform:translateY(-3px);
        filter:brightness(1.18);
    }
}
@keyframes pixelGlowSoft{
    from{opacity:.85;}
    to{opacity:1;}
}
@keyframes floatText{
    0%{transform:translateY(0);}
    50%{transform:translateY(-4px);}
    100%{transform:translateY(0);}
}
#fireworks{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}
    </style>
</head>
<body>
    <div class="box">
        <h2>送给专属男朋友的惊喜抽奖 💝</h2>
        <div class="count" id="countTip">剩余抽奖次数：2 次</div>
        <div class="wheel-box">
            <div class="pointer"></div>
            <canvas id="wheel"></canvas>
            <button class="btn" id="startBtn">开始<br>抽奖</button>
        </div>
        <div class="result" id="result"></div>
        <div class="task-box">
    <h4>✅ 完成小挑战 +1 次抽奖机会</h4>

    <!-- 1.邀请码区域 -->
    <div style="margin:10px 0;">
        <div style="font-size:13px;color:#c72c5e;margin-bottom:6px;">输入专属邀请码领取次数</div>
        <input type="text" id="codeInput" placeholder="请输入邀请码" 
        style="width:160px;padding:6px;border:1px solid #ffc2e0;border-radius:6px;outline:none;">
        <button onclick="checkInviteCode()" style="padding:6px 10px;border:none;background:#ff6b9c;color:#fff;border-radius:6px;margin-left:5px;">兑换</button>
        <div id="codeTip" style="font-size:12px;margin-top:4px;"></div>
    </div>

    <!-- 2.10秒点击挑战 -->
    <div style="margin:15px 0 5px;">
        <button id="clickBtn" onclick="startClickGame()" 
        style="padding:8px 12px;border:none;background:#ff8fbf;color:#fff;border-radius:6px;">
            开始10秒极速点击
        </button>
        <span id="timeTip" style="margin-left:10px;color:#d6336c;font-weight:bold;"></span>
        <div id="clickTip" style="font-size:12px;margin-top:4px;"></div>
    </div>
</div>
    <div class="right-box">
        <h3 class="record-title">🎁 已抽到的礼物</h3>
        <div class="record-list" id="recordList"></div>
    </div>
    <!-- 欢迎弹窗 -->
<div id="welcomePopup" class="popup-mask">
    <canvas id="fireworks"></canvas>
    <div class="popup-box">
        <div class="bubble-area"></div>
        <h2>💖 泡芙太棒啦！</h2>
        <p>
            成功救出了小黄，<br>
            接下来是奖励时间~
        </p>
        <button onclick="closePopup()">开始抽奖 ✨</button>
    </div>
</div>
    <script>
        const prizeList = [
            "超级抱抱一个",
            "免费奶茶一杯",
            "免吵架特权一天",
            "甜蜜亲亲×3",
            "专属约会一日游",
            "游戏陪玩一整天",
            "随便点餐特权",
            "夸夸服务全套"
        ];
        const colorList = ["#ffd6e7","#ffeaf4","#ffcfe0","#ffe3f0","#ffd2e5","#ffe8f2","#ffcce2","#ffd9eb"];
        const wheelCanvas = document.getElementById('wheel');
        const ctx = wheelCanvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const resultText = document.getElementById('result');
        const countTip = document.getElementById('countTip');
        const recordList = document.getElementById('recordList');
        wheelCanvas.width = 280;
        wheelCanvas.height = 280;
        const len = prizeList.length;
        function drawWheel() {
            const r = 140;
            ctx.clearRect(0,0,280,280);
            for(let i = 0; i < len; i++){
                let startAngle = (i * 45 - 90) * Math.PI / 180;
                let endAngle = ((i + 1) * 45 - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(r, r);
                ctx.arc(r, r, r, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colorList[i];
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.stroke();
                ctx.save();
                ctx.translate(r, r);
                let textAngle = startAngle + (endAngle - startAngle) / 2;
                ctx.rotate(textAngle);
                ctx.font = "13px sans-serif";
                ctx.fillStyle = "#c72c5e";
                ctx.textAlign = "center";
                ctx.fillText(prizeList[i], 90, 5);
                ctx.restore();
            }
        }
        drawWheel();
        let count = 2;
        // 每个板块角度
const itemAngle = 45;

startBtn.onclick = function () {
    if (count <= 0) {
        resultText.innerText = "❌ 次数用完啦，完成挑战加次数！";
        return;
    }

    startBtn.disabled = true;
    resultText.innerText = "抽奖中～";

    count--;
    countTip.innerText = `剩余抽奖次数：${count} 次`;

    let idx = Math.floor(Math.random() * prizeList.length);
    let winText = prizeList[idx];

    const itemAngle = 360 / prizeList.length;

    // 👉 每次都从0开始算（核心）
    let rotateTo = 360 * 6 + (360 - idx * itemAngle - itemAngle / 2);

    // ⭐关键：彻底清状态
    wheelCanvas.style.transition = "none";
    wheelCanvas.style.transform = "rotate(0deg)";

    // ⭐强制重绘
    wheelCanvas.offsetHeight;

    // ⭐重新开启动画
    wheelCanvas.style.transition = "transform 4s cubic-bezier(0.2, 0.8, 0.2, 1)";
    wheelCanvas.style.transform = `rotate(${rotateTo}deg)`;

    setTimeout(() => {
        resultText.innerText = `🎉恭喜中奖：${winText}`;
        addRecord(winText);
        startBtn.disabled = false;
    }, 4000);
};
        function addCount(){
            count++;
            countTip.innerText = `剩余抽奖次数：${count} 次`;
            resultText.innerText = "✅ 次数+1！可以继续抽奖啦～";
        }
        function addRecord(win){
            let item = document.createElement('div');
            item.className = "record-item";
            item.innerText = win;
            recordList.prepend(item);
        }
        // ================== 烟花：像素线条爱心 + 彩带 ==================
        const fireCanvas = document.getElementById("fireworks");
        const fctx = fireCanvas.getContext("2d");
        fireCanvas.width = window.innerWidth;
        fireCanvas.height = window.innerHeight;
        let particles = [];
        // 像素线条爱心
        class PixelHeart {
            constructor(x,y,color){
                this.x=x;this.y=y;
                this.size=Math.random()*8+6;
                this.color=color;
                this.speedX=(Math.random()-0.5)*6;
                this.speedY=(Math.random()-0.5)*6;
                this.gravity=0.04;
                this.alpha=1;
                this.rotation=Math.random()*360;
            }
            update(){
                this.speedY+=this.gravity;
                this.x+=this.speedX;
                this.y+=this.speedY;
                this.alpha-=0.007;
                this.rotation+=0.5;
            }
            draw(){
                fctx.save();
                fctx.translate(this.x,this.y);
                fctx.rotate(this.rotation*Math.PI/180);
                fctx.globalAlpha=this.alpha;
                fctx.strokeStyle=this.color;
                fctx.lineWidth=1.5;
                fctx.beginPath();
                let s=this.size;
                fctx.moveTo(0,0);
                fctx.bezierCurveTo(-s/2,-s/2,-s,s/3,0,s);
                fctx.bezierCurveTo(s,s/3,s/2,-s/2,0,0);
                fctx.stroke();
                fctx.restore();
            }
        }
        // 彩带
        class Ribbon {
            constructor(x,y,color){
                this.x=x;this.y=y;
                this.w=Math.random()*4+2;
                this.h=Math.random()*25+10;
                this.color=color;
                this.speedX=(Math.random()-0.5)*8;
                this.speedY=(Math.random()-0.5)*8;
                this.gravity=0.06;
                this.alpha=1;
                this.rotate=Math.random()*360;
            }
            update(){
                this.speedY+=this.gravity;
                this.x+=this.speedX;
                this.y+=this.speedY;
                this.alpha-=0.008;
                this.rotate+=2;
            }
            draw(){
                fctx.save();
                fctx.translate(this.x,this.y);
                fctx.rotate(this.rotate*Math.PI/180);
                fctx.globalAlpha=this.alpha;
                fctx.fillStyle=this.color;
                fctx.fillRect(-this.w/2,-this.h/2,this.w,this.h);
                fctx.restore();
            }
        }
        function explode(){
            const colors=["#ff85c1","#ff6fa8","#ff9ecb","#ffd1e8","#73d9ff"];
            let x=Math.random()*window.innerWidth;
            let y=Math.random()*window.innerHeight*0.4;
            // 线条爱心（少）
            for(let i=0;i<10;i++){
                let c=colors[Math.floor(Math.random()*colors.length)];
                particles.push(new PixelHeart(x,y,c));
            }
            // 彩带（多）
            for(let i=0;i<20;i++){
                let c=colors[Math.floor(Math.random()*colors.length)];
                particles.push(new Ribbon(x,y,c));
            }
        }
        function animate(){
            fctx.clearRect(0,0,fireCanvas.width,fireCanvas.height);
            for(let i=0;i<particles.length;i++){
                particles[i].update();
                particles[i].draw();
                if(particles[i].alpha<=0){
                    particles.splice(i,1);i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
        let fireInterval=setInterval(explode,700);
        function closePopup(){
            document.getElementById("welcomePopup").style.display="none";
            clearInterval(fireInterval);
        }
        // 弹窗漂浮：像素线条爱心
        window.onload=function(){
            createBubbles();
        }
        function createBubbles(){
            const area=document.querySelector('.bubble-area');
            if(!area)return;
            // 泡泡
            for(let i=0;i<8;i++){
                let s=document.createElement('span');
                let size=Math.random()*20+8;
                s.style.width=size+'px';
                s.style.height=size+'px';
                s.style.left=Math.random()*100+'%';
                s.style.animationDuration=(Math.random()*3+4)+'s';
                area.appendChild(s);
            }
            // 像素线条爱心
            let pixelHearts=[
                '♡','♥','❥','✦','♡','♥'
            ];
            for(let i=0;i<8;i++){
                let e=document.createElement('i');
                e.innerText=pixelHearts[i%pixelHearts.length];
                e.style.left=Math.random()*100+'%';
                e.style.fontSize=Math.random()*14+12+'px';
                e.style.animationDuration=(Math.random()*3+4)+'s';
                area.appendChild(e);
            }
        }
        // 全局限制：邀请码只能领一次
let codeCanGet = true;
// 全局限制：点击挑战只能完成一次
let clickCanGet = true;

// ========== 1.邀请码验证 ==========
function checkInviteCode(){
    if(!codeCanGet){
        document.getElementById("codeTip").innerText = "❌ 已兑换过，无法重复领取";
        document.getElementById("codeTip").style.color = "#f00";
        return;
    }
    let inputVal = document.getElementById("codeInput").value.trim();
    const rightCode = "JK6S25BT8N";
    if(inputVal === rightCode){
        addCount();
        codeCanGet = false;
        document.getElementById("codeTip").innerText = "✅ 邀请码正确，次数+1";
        document.getElementById("codeTip").style.color = "#27ae60";
    }else{
        document.getElementById("codeTip").innerText = "❌ 邀请码错误";
        document.getElementById("codeTip").style.color = "#f00";
    }
}

// ========== 2.10秒点击挑战 ==========
let clickCount = 0;
let clickTimer = null;
let timeLeft = 10;

function startClickGame(){
    if(!clickCanGet){
        document.getElementById("clickTip").innerText = "❌ 该挑战已完成，无法重复参与";
        document.getElementById("clickTip").style.color = "#f00";
        return;
    }
    // 重置数据
    clickCount = 0;
    timeLeft = 10;
    const btn = document.getElementById("clickBtn");
    const timeTip = document.getElementById("timeTip");
    const clickTip = document.getElementById("clickTip");

    clickTip.innerText = "";
    btn.innerText = "疯狂点我！";

    // 倒计时
    timeTip.innerText = `剩余：${timeLeft}s`;
    clickTimer = setInterval(()=>{
        timeLeft--;
        timeTip.innerText = `剩余：${timeLeft}s`;
        if(timeLeft <= 0){
            clearInterval(clickTimer);
            // 判断是否大于30次
            if(clickCount >= 30){
                addCount();
                clickCanGet = false;
                clickTip.innerText = `✅ 挑战成功！点击${clickCount}次，次数+1`;
                clickTip.style.color = "#27ae60";
            }else{
                clickTip.innerText = `❌ 挑战失败，仅点击${clickCount}次（需≥30）`;
                clickTip.style.color = "#f00";
            }
            btn.innerText = "开始10秒极速点击";
        }
    },1000);

    // 按钮点击计数
    btn.onclick = function(){
        if(timeLeft > 0){
            clickCount++;
        }
    }
}
    </script>
</body>
</html>
