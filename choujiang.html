<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专属男友抽奖机 💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe6f2, #fff0f8);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .box {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 25px #ffc8e080;
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
        }
        .right-box {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px #ffc8e080;
            width: 300px;
            height: 550px;
            display: flex;
            flex-direction: column;
        }
        h2 {
            color: #ff6b9c;
            margin-bottom: 20px;
        }
        .wheel-box {
            width: 280px;
            height: 280px;
            margin: 0 auto 25px;
            position: relative;
        }
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #ff99bb;
            transition: all 4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .pointer {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 28px solid #ff4477;
            z-index: 99;
            filter: drop-shadow(0 2px 3px #0002);
        }
        .btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #ff6b9c;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            cursor: pointer;
            box-shadow: 0 4px 12px #ff6b9c70;
        }
        .btn:active {
            scale: 0.95;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .count {
            font-size: 17px;
            color: #d6336c;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .result {
            font-size: 18px;
            color: #d6336c;
            min-height: 28px;
            font-weight: bold;
            margin-top: 15px;
        }
        .task-box {
            margin-top: 20px;
            text-align: left;
            background: #fff7fa;
            padding: 15px;
            border-radius: 12px;
        }
        .task-box h4 {
            color: #ff6b9c;
            margin-bottom: 10px;
        }
        .task {
            padding: 8px 10px;
            background: #ffd6e7;
            border-radius: 8px;
            margin: 6px 0;
            cursor: pointer;
            font-size: 14px;
        }
        .task:hover {
            background: #ffc2e0;
        }
        .record-title {
            color: #ff6b9c;
            margin-bottom: 15px;
            font-size: 18px;
            text-align: center;
        }
        .record-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        .record-item {
            background: #ffebf3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #c72c5e;
        }
        /* ================= 弹窗 ================= */

.popup-mask{
    position: fixed;
    inset: 0;
    background: rgba(255,192,220,.45);
    backdrop-filter: blur(5px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup-box{
    width: 360px;
    max-width: 92%;
    background: linear-gradient(180deg,#fff0f7,#ffffff);
    border-radius: 26px;
    padding: 38px 25px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(255,120,170,.28);
    position: relative;
    overflow: hidden;
    animation: popIn .5s ease;
}

/* 像素风动画字体 */
.popup-box h2,
.popup-box p{
    font-family:
        "Press Start 2P",
        "ZCOOL KuaiLe",
        "Microsoft YaHei",
        sans-serif;
    letter-spacing: 1px;
}

.popup-box h2{
    color:#ff5f9a;
    font-size:24px;
    line-height:1.6;
    margin-bottom:18px;
    position:relative;
    z-index:2;

    text-shadow:
        2px 0 #ffd3e6,
        -2px 0 #ffd3e6,
        0 2px #ffd3e6,
        0 -2px #ffd3e6,
        3px 3px #ff9fc4;

    animation:
        pixelGlow 1.2s infinite alternate,
        floatText 2s ease-in-out infinite;
}

.popup-box p{
    color:#ff6fa8;
    font-size:14px;
    line-height:2;
    margin-bottom:25px;
    position:relative;
    z-index:2;

    text-shadow:
        1px 1px #ffd8ea,
        2px 2px #ffc3dd;

    animation: pixelGlowSoft 1.4s infinite alternate;
}

.popup-box button{
    border:none;
    background: linear-gradient(135deg,#ff7eb3,#ff5f9a);
    color:#fff;
    padding:12px 26px;
    border-radius:999px;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(255,105,160,.35);
    position:relative;
    z-index:2;
}

.popup-box button:hover{
    transform:scale(1.05);
}

/* 泡泡 */
.bubble-area span{
    position:absolute;
    bottom:-30px;
    background:rgba(255,170,210,.45);
    border-radius:50%;
    animation: floatUp linear infinite;
}

/* 爱心 */
.bubble-area i{
    position:absolute;
    bottom:-30px;
    color:#ff8fbf;
    font-style:normal;
    animation: floatUp linear infinite;
}

/* 动画 */

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(.5);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-430px) scale(1.2);
        opacity:0;
    }
}

@keyframes popIn{
    from{
        transform:scale(.6);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes pixelGlow{
    from{
        transform:translateY(0);
        filter:brightness(1);
    }
    to{
        transform:translateY(-3px);
        filter:brightness(1.18);
    }
}

@keyframes pixelGlowSoft{
    from{opacity:.85;}
    to{opacity:1;}
}

@keyframes floatText{
    0%{transform:translateY(0);}
    50%{transform:translateY(-4px);}
    100%{transform:translateY(0);}
}
        #fireworks{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}
    </style>
</head>
<body>
    <div class="box">
        <h2>送给专属男朋友的惊喜抽奖 💝</h2>
        <div class="count" id="countTip">剩余抽奖次数：2 次</div>

        <div class="wheel-box">
            <div class="pointer"></div>
            <canvas id="wheel"></canvas>
            <button class="btn" id="startBtn">开始<br>抽奖</button>
        </div>

        <div class="result" id="result"></div>

        <div class="task-box">
            <h4>✅ 完成小挑战 +1 次抽奖机会</h4>
            <div class="task" onclick="addCount()">亲我一口😚</div>
            <div class="task" onclick="addCount()">抱我10秒🥰</div>
            <div class="task" onclick="addCount()">说我爱你❤️</div>
            <div class="task" onclick="addCount()">给我拍张照📸</div>
        </div>
    </div>

    <div class="right-box">
        <h3 class="record-title">🎁 已抽到的礼物</h3>
        <div class="record-list" id="recordList"></div>
    </div>

    <script>
        const prizeList = [
            "超级抱抱一个",
            "免费奶茶一杯",
            "免吵架特权一天",
            "甜蜜亲亲×3",
            "专属约会一日游",
            "游戏陪玩一整天",
            "随便点餐特权",
            "夸夸服务全套"
        ];
        const colorList = ["#ffd6e7","#ffeaf4","#ffcfe0","#ffe3f0","#ffd2e5","#ffe8f2","#ffcce2","#ffd9eb"];

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const resultText = document.getElementById('result');
        const countTip = document.getElementById('countTip');
        const recordList = document.getElementById('recordList');

        canvas.width = 280;
        canvas.height = 280;
        let rotateAngle = 0;
        const len = prizeList.length;

        // 绘制转盘
        function drawWheel() {
            const r = 140;
            ctx.clearRect(0,0,280,280);
            for(let i = 0; i < len; i++){
                let startAngle = (i * 45 - 90) * Math.PI / 180;
                let endAngle = ((i + 1) * 45 - 90) * Math.PI / 180;
                
                ctx.beginPath();
                ctx.moveTo(r, r);
                ctx.arc(r, r, r, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colorList[i];
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.stroke();

                // 文字
                ctx.save();
                ctx.translate(r, r);
                let textAngle = startAngle + (endAngle - startAngle) / 2;
                ctx.rotate(textAngle);
                ctx.font = "13px sans-serif";
                ctx.fillStyle = "#c72c5e";
                ctx.textAlign = "center";
                ctx.fillText(prizeList[i], 90, 5);
                ctx.restore();
            }
        }
        drawWheel();

        let count = 2;

        startBtn.onclick = function () {
    if (count <= 0) {
        resultText.innerText = "❌ 次数用完啦，完成挑战加次数！";
        return;
    }

    startBtn.disabled = true;
    resultText.innerText = "抽奖中～";

    count--;
    countTip.innerText = `剩余抽奖次数：${count} 次`;

    const perDeg = 360 / len; // 每格45度

    // 随机中奖编号
    let prizeIndex = Math.floor(Math.random() * len);

    // 当前奖品中心角度（重点）
    let targetDeg = prizeIndex * perDeg + perDeg / 2;

    // 再加一点随机偏移（不超过10度）
    let offset = Math.random() * 20 - 10;

    // 转5圈以上再停
    let totalRotate = 360 * 5 + targetDeg + offset;

    rotateAngle += totalRotate;

    canvas.style.transform = `rotate(${rotateAngle}deg)`;

    setTimeout(() => {

        let win = prizeList[len - 1 - prizeIndex];

        resultText.innerText = `🎉恭喜中奖：${win}`;
        addRecord(win);

        startBtn.disabled = false;

    }, 4000);
}

        function addCount(){
            count++;
            countTip.innerText = `剩余抽奖次数：${count} 次`;
            resultText.innerText = "✅ 次数+1！可以继续抽奖啦～";
        }

        function addRecord(win){
            let item = document.createElement('div');
            item.className = "record-item";
            item.innerText = win;
            recordList.prepend(item);
        }
        const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

// ❤️ 爱心粒子
class HeartParticle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;

        this.size = Math.random() * 12 + 8;

        this.color = color;

        // 随机方向爆炸
        this.speedX = (Math.random() - 0.5) * 10;
        this.speedY = (Math.random() - 0.5) * 10;

        this.gravity = 0.05;
        this.alpha = 1;

        this.rotation = Math.random() * 360;
        this.rotateSpeed = (Math.random() - 0.5) * 10;
    }

    update() {
        this.speedY += this.gravity;

        this.x += this.speedX;
        this.y += this.speedY;

        this.alpha -= 0.008;
        this.rotation += this.rotateSpeed;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation * Math.PI / 180);
        ctx.globalAlpha = this.alpha;

        ctx.fillStyle = this.color;

        drawHeart(ctx, 0, 0, this.size);

        ctx.restore();
    }
}

// ❤️ 画爱心函数
function drawHeart(ctx, x, y, size) {
    ctx.beginPath();
    ctx.moveTo(x, y);

    ctx.bezierCurveTo(
        x - size / 2, y - size / 2,
        x - size, y + size / 3,
        x, y + size
    );

    ctx.bezierCurveTo(
        x + size, y + size / 3,
        x + size / 2, y - size / 2,
        x, y
    );

    ctx.fill();
}

// 🎆 爆炸生成
function explode() {
    const colors = [
        "#ff4d88",
        "#ff6fa8",
        "#ff9ecb",
        "#ffd1e8",
        "#ff85c1"
    ];

    let x = Math.random() * window.innerWidth;
    let y = Math.random() * window.innerHeight * 0.4;

    for (let i = 0; i < 40; i++) {
        let color = colors[Math.floor(Math.random() * colors.length)];
        particles.push(new HeartParticle(x, y, color));
    }
}

// 🎬 动画循环
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();

        if (particles[i].alpha <= 0) {
            particles.splice(i, 1);
            i--;
        }
    }

    requestAnimationFrame(animate);
}

animate();

// 💥 连续烟花（弹窗出现自动播放）
let fireInterval = setInterval(explode, 500);

// ❌ 关闭弹窗停止
function closePopup() {
    document.getElementById("welcomePopup").style.display = "none";
    clearInterval(fireInterval);
}
    </script>
    <!-- 欢迎弹窗 -->
<div id="welcomePopup" class="popup-mask">
    <canvas id="fireworks"></canvas>
    <div class="popup-box">
        <div class="bubble-area"></div>

        <h2>💖 泡芙太棒啦！</h2>

        <p>
            成功救出了小黄，<br>
            接下来是奖励时间~
        </p>

        <button onclick="closePopup()">开始抽奖 ✨</button>
    </div>
</div>
</body>
</html>
