<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>神秘网页</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: "Microsoft YaHei", monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

#box {
  width: 80%;
  max-width: 600px;
  text-align: center;
  transition: transform 0.2s;
}

#text {
  font-size: 18px;
  line-height: 1.8;
  min-height: 200px;
  white-space: pre-line;
}

#btn {
  display: none;
  margin-top: 30px;
  padding: 10px 20px;
  border: 1px solid #fff;
  background: transparent;
  color: #fff;
  cursor: pointer;
}

#inputArea {
  display: none;
  margin-top: 20px;
}

.code {
  width: 40px;
  height: 50px;
  text-align: center;
  font-size: 24px;
  margin: 5px;
  background: #000;
  border: 1px solid #fff;
  color: #fff;
}
</style>
</head>

<body>

<div id="box">
  <div id="text"></div>
  <button id="btn">进入网页</button>

  <div id="inputArea">
    <input maxlength="1" class="code">
    <input maxlength="1" class="code">
    <input maxlength="1" class="code">
    <input maxlength="1" class="code">
  </div>
</div>

<script>
const t = document.getElementById("text");
const b = document.getElementById("btn");
const area = document.getElementById("inputArea");
const inp = document.querySelectorAll(".code");

//
const str = `你是泡芙，是一名研一学生。
放暑假的你终于回到家里，可以见到女朋友小黄了。

但是房间里没有人，发微信也没有任何回复，
但是昨天才聊天了。

这时你发现小黄的电脑是打开的，
里面有一个神秘网页。

你下意识觉得，小黄的消失跟这个网页有关……`;

let i = 0;
function typing(){
  if(i < str.length){
    t.innerHTML += str.charAt(i);
    i++;
    setTimeout(typing,40);
  } else {
    b.style.display = "inline-block";
  }
}
typing();

// 点击进入
b.onclick = () => {
  area.style.display = "block";
  b.style.display = "none";
};

// 自动跳格
inp.forEach((e,i)=>{
  e.addEventListener("input",()=>{
    if(e.value && i<inp.length-1){
      inp[i+1].focus();
    }
    check();
  });
});

// 
function check(){
  const v = Array.from(inp).map(x=>x.value).join("");
  const key = atob("MDYyOQ=="); //

  if(v.length === 4){
    if(v === key){

      document.body.style.transition="opacity 1s";
      document.body.style.opacity="0";

      setTimeout(()=>{
        location.href="page2.html";
      },1000);

    } else {
      inp.forEach(x=>x.value="");
      inp[0].focus();

      // 轻微抖动
      box.style.transform="translateX(10px)";
      setTimeout(()=>box.style.transform="translateX(-10px)",50);
      setTimeout(()=>box.style.transform="translateX(0)",100);
    }
  }
}
</script>

</body>
</html>
