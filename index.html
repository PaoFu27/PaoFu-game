<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>神秘网页</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: "Microsoft YaHei", monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

#container {
  width: 80%;
  max-width: 600px;
  text-align: center;
}

#text {
  font-size: 18px;
  line-height: 1.8;
  min-height: 200px;
  white-space: pre-line;
}

#enterBtn {
  display: none;
  margin-top: 30px;
  padding: 10px 20px;
  border: 1px solid #fff;
  background: transparent;
  color: #fff;
  cursor: pointer;
}

#enterBtn:hover {
  background: #fff;
  color: #000;
}

/* 输入区 */
#inputArea {
  display: none;
  margin-top: 20px;
}

.code-input {
  width: 40px;
  height: 50px;
  text-align: center;
  font-size: 24px;
  margin: 5px;
  background: #000;
  border: 1px solid #fff;
  color: #fff;
}

#hint {
  margin-top: 10px;
  font-size: 14px;
  color: #aaa;
}
</style>
</head>

<body>

<div id="container">
  <div id="text"></div>

  <button id="enterBtn">进入网页</button>

  <div id="inputArea">
    <div>
      <input maxlength="1" class="code-input">
      <input maxlength="1" class="code-input">
      <input maxlength="1" class="code-input">
      <input maxlength="1" class="code-input">
    </div>
    <div id="hint">提示：一个特殊的日期</div>
  </div>
</div>

<script>
const textEl = document.getElementById("text");
const enterBtn = document.getElementById("enterBtn");
const inputArea = document.getElementById("inputArea");
const inputs = document.querySelectorAll(".code-input");

// 文案
const content = `你是泡芙，是一名研一学生。
放暑假的你终于回到家里，可以见到女朋友小黄了。

但是房间里没有人，发微信也没有任何回复，
但是昨天才聊天了。

这时你发现小黄的电脑是打开的，
里面有一个神秘网页。

你下意识觉得，小黄的消失跟这个网页有关……`;

// 打字机效果
let i = 0;
function typeWriter() {
  if (i < content.length) {
    textEl.innerHTML += content.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  } else {
    enterBtn.style.display = "inline-block";
  }
}

typeWriter();

// 点击进入
enterBtn.onclick = () => {
  inputArea.style.display = "block";
  enterBtn.style.display = "none";
};

// 自动跳到下一个输入框
inputs.forEach((input, index) => {
  input.addEventListener("input", () => {
    if (input.value && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }
    checkCode();
  });
});

// 检查密码
function checkCode() {
  const code = Array.from(inputs).map(i => i.value).join("");
  
  if (code.length === 4) {
    if (code === "0629") {

  // 让页面慢慢变黑
  document.body.style.transition = "opacity 1s";
  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "page2.html";
  }, 1000);
} else {
      alert("不对，再想想这个日期…");
      inputs.forEach(i => i.value = "");
      inputs[0].focus();
    }
  }
}
</script>

</body>
</html>
