<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>回声论坛</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111} .wrap{max-width:1100px;margin:auto;padding:24px} .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;margin-bottom:18px} .post{display:block;text-decoration:none;color:#111;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin:12px 0} .post:hover{background:#f9fafb}.meta{color:#6b7280;font-size:14px}.deleted{background:#f9fafb}.deleted .title{text-decoration:line-through;color:#9ca3af}.reply{background:#f9fafb;border-radius:12px;padding:12px;margin:10px 0}.notice{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px;line-height:1.8}.back{color:#2563eb;text-decoration:none}
</style>
</head>
<body>
<div class='wrap' id='app'></div>
<script>
const posts=[
{id:1,title:'参与星核计划后持续失眠与记忆断层',author:'X7A29',date:'2026-04-22 21:14',days:1,content:'签署保密协议后接受设备测试，之后连续出现失眠、短时失忆，提交报告后账号被停用。',replies:['我也有类似情况。','保留体检报告很重要。','他们让我签补充协议。','我朋友也被停用了账号。','建议统一整理证据。','昨晚再次头痛。']},
{id:2,title:'星核终端凌晨自动启动并播放噪音',author:'K3M81',date:'2026-04-21 09:33',days:2,content:'终端设备凌晨3点自动亮起，出现无法识别的波形画面。',replies:['我录到过同样声音。','他们解释成远程更新。','我家设备也自己开机。','日志第二天被清空。']},
{id:3,title:'志愿者群组12人同日失联',author:'Q9L44',date:'2026-04-19 18:02',days:4,content:'原本联络受害者名单，今天发现多人账号同时注销。',replies:['太异常了。','昨晚还在线。','手机号也停机了。']},
{id:4,title:'实验中心一夜搬空',author:'T2R77',date:'2026-04-17 11:50',days:6,content:'挂牌的星核体验中心凌晨搬离，监控与招牌同时拆除。',replies:['附近居民也看到了。','像是紧急撤离。']},
{id:5,title:'测试后出现耳鸣',author:'M8N12',date:'2026-04-15 08:40',days:8,replies:[]},
{id:6,title:'宣传资料全部下线',author:'Z5P63',date:'2026-04-05 14:20',days:18,replies:[]}
];
const app=document.getElementById('app');
const status=p=>p.days<=7?'active':p.days<=30?'deleted':'purged';
function home(){let html=`<div class='card'><h1>回声论坛</h1><div class='meta'>系统时间：2026年4月23日</div><div class='notice'><b>首页公告</b><br>这里记录星核计划相关受害者的声音。<br>帖子仅保留7天可阅读权限；超过7天锁定显示已删除；超过30天永久销毁。<br>期望有一天，能有人听到我们的声音。</div></div><div class='card'><h2>最新帖子（30天内）</h2>`; posts.filter(p=>p.days<=30).forEach(p=>{if(status(p)==='active'){html+=`<a class='post' href='?post=${p.id}'><div class='title'><b>${p.title}</b></div><div class='meta'>${p.author} · ${p.date}</div><div class='meta'>${p.replies.length} 条回复</div></a>`}else{html+=`<div class='post deleted'><div class='title'><b>${p.title}</b></div><div class='meta'>${p.author} · ${p.date}</div><div style='color:#dc2626;margin-top:8px'>已删除（超过7天，不可查看）</div></div>`}});html+='</div>';app.innerHTML=html;}
function detail(id){const p=posts.find(x=>x.id==id);if(!p||status(p)!=='active'){home();return;}let html=`<div class='card'><a class='back' href='?'>← 返回首页</a><h1>${p.title}</h1><div class='meta'>${p.author} · ${p.date}</div><p style='line-height:1.9;margin-top:18px'>${p.content}</p><hr><h3>全部回复（${p.replies.length}）</h3>`;p.replies.forEach((r,i)=>html+=`<div class='reply'><div class='meta'>U${i+1}A${10+i}</div>${r}</div>`);html+='</div>';app.innerHTML=html;}
const id=new URLSearchParams(location.search).get('post'); if(id) detail(id); else home();
</script>
</body>
</html>
