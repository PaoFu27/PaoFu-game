const app=document.getElementById('app');
const status=p=>p.days<=7?'active':p.days<=30?'deleted':'purged';

function home(){
let html=`<div class='card'><h1>回声论坛</h1><div class='meta'>系统时间：2026-04-23</div><div class='notice'><b>首页公告</b><br>星途计划相关信息记录<br>7天可读 / 30天清除机制已启用</div></div><div class='card'><h2>帖子列表（最新 → 旧）</h2>`;

posts.sort((a,b)=>new Date(b.date)-new Date(a.date));

posts.forEach(p=>{
if(status(p)==='active'){
html+=`<a class='post' href='?post=${p.id}'><b>${p.title}</b><div class='meta'>${p.author} · ${p.date} · 回复 ${p.replies.length} · 浏览 ${1200+p.id*90}</div></a>`;
}else{
html+=`<div class='post deleted'><b class='title'>${p.title}</b><div class='meta'>${p.author} · ${p.date}</div><div style='color:#dc2626;margin-top:8px'>已删除（超过7天不可查看）</div></div>`;
}
});

html+='</div>';
app.innerHTML=html;
}

function detail(id){
const p=posts.find(x=>x.id==id);
if(!p||status(p)!=='active'){home();return;}

let html=`<div class='card'><a class='back' href='?'>← 返回首页</a><div class='meta'>回声论坛 / 帖子详情</div><h1>${p.title}</h1><div class='meta'>${p.author} · ${p.date} <span class='badge'>浏览 ${1500+p.id*110}</span></div><p style='line-height:2;margin-top:16px;white-space:pre-line'>${p.content}</p><div class='notice'>提示：该帖仍处于7天有效期</div><hr><h3>讨论区回复（${p.replies.length}）</h3>`;

p.replies.forEach((r,i)=>{
html+=`<div class='reply'><div class='meta'>${i+1}楼 · ${Math.random().toString(36).slice(2,6).toUpperCase()}</div><div style='margin-top:6px;line-height:1.8'>${r}</div><div style='margin-top:10px;font-size:13px;color:#6b7280'>👍 ${15+i*4} 👎 ${i%3} 回复 引用</div></div>`;
});

if(p.id===8){
html+=`<div class='reply'><div class='meta'><b>管理员</b> · SYSTEM</div><div style='margin-top:6px;line-height:1.8'><b>通话加密已完成。异常流量已标记。</b><br><b>找到终端码立即发送，我可尝试终端破解。</b><br><b>24小时后论坛可能被扫描清理。</b></div></div>`;
}

html+=`</div>`;
app.innerHTML=html;
}

const id=new URLSearchParams(location.search).get('post');
if(id) detail(id); else home();
