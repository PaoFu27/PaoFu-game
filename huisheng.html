<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>回声论坛</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111} .wrap{max-width:1100px;margin:auto;padding:24px} .card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:20px;margin-bottom:18px} .post{display:block;text-decoration:none;color:#111;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin:12px 0} .post:hover{background:#f9fafb}.meta{color:#6b7280;font-size:14px}.deleted{background:#f9fafb}.deleted .title{text-decoration:line-through;color:#9ca3af}.reply{background:#f9fafb;border-radius:12px;padding:12px;margin:10px 0}.notice{background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px;line-height:1.8}.back{color:#2563eb;text-decoration:none}
</style>
</head>
<body>
<div class='wrap' id='app'></div>
<script>
const posts=[
{id:7,title:'我是星途员工，今天才知道真相',author:'CY7R4',date:'2026-04-14 16:32',days:9,replies:[]},
{id:8,title:'我成功拿到了那些数据，事情比想象更严重',author:'CY7R4',date:'2026-04-22 19:08',days:1,content:'我把内部备份导出来了，里面不只是用户资料，还有星核计划测试日志、参与者异常记录、删除指令时间线，以及几份要求统一口径的内部通知。很多人以为只是退款纠纷，但真正被掩盖的是测试造成的后遗症和名单清理记录。我会分批整理，如果我失联，请把这篇帖保存下来。',replies:['先截图存档，别让帖子消失。','你说的异常记录具体指什么？是身体问题还是记忆问题？','如果有名单请先匿名处理，别让当事人二次受伤。','我一直怀疑他们在删东西，原来真有删除指令。','建议同步发到海外平台，单一站点容易被清掉。','你确认这些数据来源真实吗？有没有时间戳和签名文件？','我朋友参加测试后长期失眠，如果有日志请帮忙查编号。','统一口径通知这点最可怕，说明内部早知道出事。','先别一次全放，分批公开更安全。','已经备份到本地硬盘了，你继续更新。','如果你真是员工，注意保护自己身份。','我看完背后发凉，这不像普通商业纠纷。']},

{id:1,title:'参与星核计划后持续失眠与记忆断层',author:'X7A29',date:'2026-04-22 21:14',days:1,content:'签署保密协议后接受设备测试，之后连续出现失眠、短时失忆，提交报告后账号被停用。',replies:['我也有类似情况，已经连续两周睡眠被打断，白天精神很差。','保留体检报告很重要，后面很多资料都会被要求回收。','他们让我签补充协议，还要求删除聊天记录。','我朋友也被停用了账号，现在连客服入口都找不到。','建议统一整理证据，不然每个人单独反馈都被忽略。','昨晚再次头痛，而且耳鸣持续了将近一个小时。','我已经预约医院复查，希望有人同步情况。']},
{id:2,title:'星核终端凌晨自动启动并播放噪音',author:'K3M81',date:'2026-04-21 09:33',days:2,content:'终端设备凌晨3点自动亮起，出现无法识别的波形画面。',replies:['我录到过同样声音，像持续几分钟的高频电流声。','他们解释成远程更新，但我根本没开自动升级。','我家设备也自己开机，屏幕亮度自动拉满。','日志第二天被清空，昨晚记录完全不见了。','建议拔掉电源再观察，感觉这设备很不正常。']},
{id:3,title:'志愿者群组12人同日失联',author:'Q9L44',date:'2026-04-19 18:02',days:4,content:'原本联络受害者名单，今天发现多人账号同时注销。',replies:['太异常了，像是统一处理过。','昨晚还在线，今天资料全部清空。','手机号也停机了，联系不上任何人。','如果有人还有备份名单，请尽快保存。']},
{id:4,title:'实验中心一夜搬空',author:'T2R77',date:'2026-04-17 11:50',days:6,content:'挂牌的星核体验中心凌晨搬离，监控与招牌同时拆除。',replies:['附近居民也看到了，说凌晨有几辆货车来回装载。','像是紧急撤离，门口的标识牌当天就拆掉了。','我早上经过时，连前台桌椅都不见了。']},
{id:5,title:'测试后出现耳鸣',author:'M8N12',date:'2026-04-15 08:40',days:8,replies:[]},
{id:6,title:'宣传资料全部下线',author:'Z5P63',date:'2026-04-05 14:20',days:18,replies:[]}
];
const app=document.getElementById('app');
const status=p=>p.days<=7?'active':p.days<=30?'deleted':'purged';
function home(){let html=`<div class='card'><h1>回声论坛</h1><div class='meta'>系统时间：2026年4月23日</div><div class='notice'><b>首页公告</b><br>这里记录星核计划相关受害者的声音。<br>帖子仅保留7天可阅读权限；超过7天锁定显示已删除；超过30天永久销毁。<br>期望有一天，能有人听到我们的声音。</div></div><div class='card'><h2>最新帖子（30天内）</h2>`; posts.filter(p=>p.days<=30).forEach(p=>{if(status(p)==='active'){html+=`<a class='post' href='?post=${p.id}'><div class='title'><b>${p.title}</b></div><div class='meta'>${p.author} · ${p.date}</div><div class='meta'>${p.replies.length} 条回复 · ${860+p.id*121} 浏览</div></a>`}else{html+=`<div class='post deleted'><div class='title'><b>${p.title}</b></div><div class='meta'>${p.author} · ${p.date}</div><div style='color:#dc2626;margin-top:8px'>已删除（超过7天，不可查看）</div></div>`}});html+=`<div style='display:flex;gap:8px;margin-top:18px'><div class='post' style='padding:8px 14px;width:auto'>上一页</div><div class='post' style='padding:8px 14px;width:auto;background:#2563eb;color:#fff'>1</div><div class='post' style='padding:8px 14px;width:auto'>2</div><div class='post' style='padding:8px 14px;width:auto'>3</div><div class='post' style='padding:8px 14px;width:auto'>下一页</div></div></div>`;app.innerHTML=html;}
function detail(id){const p=posts.find(x=>x.id==id);if(!p||status(p)!=='active'){home();return;}let html=`<div class='card'><a class='back' href='?'>← 返回首页</a><div class='meta'>回声论坛 / 帖子详情</div><h1 style='margin-top:10px'>${p.title}</h1><div class='meta'>发布者 ${p.author} · ${p.date} · 浏览 ${1200+p.id*83} · 回复 ${p.replies.length}</div><p style='line-height:2;margin-top:18px;font-size:17px'>${p.content}</p><div class='notice' style='margin-top:18px'>提示：该帖子仍在7天保留期内，可查看原文与回复。超过时限后将被锁定。</div><hr><h3>讨论区回复（${p.replies.length}）</h3>`;p.replies.forEach((r,i)=>html+=`<div class='reply'><div class='meta'>${i+1}楼 · ${['Q7M2','L9X4','T3K8','V1P6','N4R7','H8D2','C5W9','B2J1'][i]||('R'+(100+i))} · 2026-04-${22-i} ${10+i}:2${i}</div><div style='line-height:1.9;margin-top:8px'>${r}</div><div style='margin-top:10px;font-size:14px;color:#6b7280'>👍 ${18+i*3}　👎 ${i%3}　回复　引用</div></div>`);html+='</div>';app.innerHTML=html;}
const id=new URLSearchParams(location.search).get('post'); if(id) detail(id); else home();
</script>
</body>
</html>
