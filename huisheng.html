  height:100%;

  justify-content:center;
}
.chat-box{
  width:90%;
  max-width:450px;

  border:2px solid #0f0;
}
.chat-header{
  display:flex;

.chat-close{

.chat-messages{

.chat-input{

line-height:2;
margin-bottom:20px;

.next-btn{
background:#0f0;
color:#111;
border:none;
padding:12px 26px;

font-weight:bold;

const app=document.getElementById('app');
const status=p=>p.days<=7?'active':p.days<=30?'deleted':'purged';

// 聊天窗口控制
function openChat(){
  document.getElementById('chatModal').style.display='flex';
  document.getElementById('chatInput').focus();
}
function closeChat(){
  document.getElementById('chatModal').style.display='none';
}
function nextChapter(){
  window.location.href='choujiang.html';
}

// 发送消息 & 通关判断
document.addEventListener('DOMContentLoaded',()=>{
  const input=document.getElementById('chatInput');
  const messages=document.getElementById('chatMessages');
  
  input.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'){
      const text=input.value.trim();
      if(!text)return;
      
      messages.innerHTML+=`<div>你：${text}</div>`;
      messages.scrollTop=messages.scrollHeight;
      
     if(text.includes('JK6S25BT8N')){
  setTimeout(()=>{
    document.getElementById('winModal').style.display='flex';
    closeChat();
  },500);
}
      input.value='';
    }
  });
});

function home(){
let html=`<div class='card'><h1>回声论坛</h1><div class='meta'>系统时间：2026-04-23</div><div class='notice'><b>首页公告</b><br>星途计划相关信息记录<br>7天可读 / 30天清除机制已启用</div></div><div class='card'><h2>帖子列表（最新 → 旧）</h2>`;

posts.sort((a,b)=>new Date(b.date)-new Date(a.date));

posts.forEach(p=>{
if(status(p)==='active'){
html+=`<a class='post' href='?post=${p.id}'><b>${p.title}</b><div class='meta'>${p.author} · ${p.date} · 回复 ${p.replies.length} · 浏览 ${1200+p.id*90}</div></a>`;
}else{
html+=`<div class='post deleted'><b class='title'>${p.title}</b><div class='meta'>${p.author} · ${p.date}</div><div style='color:#dc2626;margin-top:8px'>已删除（超过7天不可查看）</div></div>`;
}
});

html+='</div>';
app.innerHTML=html;
}

function detail(id){
const p=posts.find(x=>x.id==id);
if(!p||status(p)!=='active'){home();return;}

let html=`<div class='card'><a class='back' href='javascript:home()'>← 返回首页</a><div class='meta'>回声论坛 / 帖子详情</div><h1>${p.title}</h1><div class='meta'>${p.author} · ${p.date} <span class='badge'>浏览 ${1500+p.id*110}</span></div><p style='line-height:2;margin-top:16px;white-space:pre-line'>${p.content}</p><div class='notice'>提示：该帖仍处于7天有效期</div><hr><h3>讨论区回复（${p.replies.length}）</h3>`;

let allReplies=[];

// 普通回复
p.replies.forEach((r,i)=>{
  const timeMatch=r.match(/^(\d{2}:\d{2})/);
  const time=timeMatch?timeMatch[1]:'00:00';

  allReplies.push({
    type:'user',
    time,
    text:r.replace(/^(\d{2}:\d{2})\s*/,''),
    floor:i+1
  });
});

// 陈远回复
if(p.id==8 && p.timeline){
  p.timeline.forEach(item=>{
    const timeMatch=item.match(/^(\d{2}:\d{2})/);
    const time=timeMatch?timeMatch[1]:'00:00';

    allReplies.push({
      type:'op',
      time,
      text:item.replace(/^(\d{2}:\d{2})\s*/,''),
    });
  });
}

// 时间排序
allReplies.sort((a,b)=>a.time.localeCompare(b.time));

// 输出
allReplies.forEach((item,index)=>{
  
  if(item.type==='user'){

    html+=`
    <div class='reply'>
      <div class='meta'>
${item.floor}楼 · ${Math.random().toString(36).slice(2,6).toUpperCase()} · ${item.time}
</div>
      <div style='margin-top:6px;line-height:1.8'>${item.text}</div>
      <div style='margin-top:10px;font-size:13px;color:#6b7280'>
        👍 ${15+index*3} 👎 ${index%3} 回复 引用
      </div>
    </div>`;

  }else{

    html+=`
    <div class='reply' style="background:#e6f7ff;border-left:3px solid #2563eb">
      <div class='meta'>${p.author}（楼主） · ${item.time}</div>
      <div style='margin-top:6px'>${item.text}</div>
    </div>`;
  }

});

// 可点击的管理员消息
if(p.id===8){
html+=`<div class='reply'><div class='meta'><b style='color:#2563eb;cursor:pointer' onclick='openChat()'>管理员</b> · SYSTEM</div><div style='margin-top:6px;line-height:1.8'><b>通话加密已完成。异常流量已标记。</b><br><b>找到终端码立即发送，我可尝试终端破解。</b><br><b>24小时后论坛可能被扫描清理。</b></div></div>`;
}

html+=`</div>`;
app.innerHTML=html;
}

const urlId=new URLSearchParams(location.search).get('post');
if(urlId) detail(urlId); else home();
</script>
