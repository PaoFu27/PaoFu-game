<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>星轨坐标 - 找到她了</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Google Sans", sans-serif;
        }

        body {
            background: #0a0a1a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .blackhole-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .success-title {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .success-desc {
            font-size: 18px;
            line-height: 1.8;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .next-btn {
            padding: 12px 24px;
            background: #3182ce;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .next-btn:hover {
            background: #2962ff;
        }
    </style>
</head>
<body>
    <div class="blackhole-icon">🌀</div>
    <div class="success-title">你集齐了所有坐标！</div>
    <div class="success-desc">
        坐标：789.456.123<br>
        你成功定位到她被困的星轨17号黑洞关卡<br>
        接下来，你需要破解游戏源码，找到出口带她回家...
    </div>
    <button class="next-btn">进入下一关 →</button>
</body>
</html>
