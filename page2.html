<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>桌面</title>

<style>
body{
  margin:0;
  background: linear-gradient(#87ceeb, #4fa3d1); /* 天蓝背景 */
  font-family: Segoe UI;
}

/* 桌面图标 */
.icon{
  width:80px;
  text-align:center;
  cursor:pointer;
  margin:20px;
  color:#000;
}

/* 窗口 */
.window{
  position:absolute;
  top:120px;
  left:200px;
  width:420px;
  background:#f0f0f0;
  border:1px solid #aaa;
  display:none;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* 标题栏 */
.titlebar{
  background:#0078d7;
  color:#fff;
  padding:5px 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
}

.close{
  cursor:pointer;
  font-weight:bold;
}

/* 内容区 */
.content{
  padding:10px;
  color:#000;
  background:#fff;
  height:200px;
  overflow:auto;
}

/* 任务栏 */
#taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  align-items:center;
  padding-left:10px;
}

#search{
  width:200px;
  padding:5px;
  background:#000;
  border:1px solid #555;
  color:#fff;
}

/* 密码框 */
#passBox{
  display:none;
  position:absolute;
  bottom:60px;
  left:20px;
  background:#111;
  padding:10px;
  border:1px solid #555;
  color:#fff;
}

.pass{
  width:30px;
  margin:2px;
  text-align:center;
  font-size:20px;
  background:#000;
  border:1px solid #555;
  color:#fff;
}
</style>
</head>

<body>

<!-- 图标 -->
<div class="icon" onclick="openWin('folderWin')">📁<br>文件夹</div>
<div class="icon" onclick="openWin('trashWin')">🗑️<br>回收站</div>
<div class="icon" onclick="openWin('noteWin')">📝<br>笔记</div>

<!-- 文件夹窗口 -->
<div id="folderWin" class="window">
  <div class="titlebar">
    文件夹
    <span class="close" onclick="closeWin('folderWin')">×</span>
  </div>
  <div class="content">
    <div onclick="openFile(0)">data_1.txt</div>
    <div onclick="openFile(1)">data_2.txt</div>
    <div onclick="openFile(2)">data_3.txt</div>
    <div onclick="openFile(3)">data_4.txt</div>
  </div>
</div>

<!-- 回收站 -->
<div id="trashWin" class="window">
  <div class="titlebar">
    回收站
    <span class="close" onclick="closeWin('trashWin')">×</span>
  </div>
  <div class="content">
    <div onclick="showContent('order')">system.log</div>
  </div>
</div>

<!-- 笔记 -->
<div id="noteWin" class="window">
  <div class="titlebar">
    笔记
    <span class="close" onclick="closeWin('noteWin')">×</span>
  </div>
  <div class="content">
    <div onclick="showContent('tip')">readme.txt</div>
  </div>
</div>

<!-- 文件内容窗口 -->
<div id="contentWin" class="window">
  <div class="titlebar">
    文档
    <span class="close" onclick="closeWin('contentWin')">×</span>
  </div>
  <div id="contentText" class="content"></div>
</div>

<!-- 任务栏 -->
<div id="taskbar">
  <input id="search" placeholder="搜索..." onclick="openPass()">
</div>

<!-- 密码输入 -->
<div id="passBox">
  <div>请输入密码</div>
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <div style="font-size:12px;color:#aaa;">提示：一个单词</div>
</div>

<script>

// 
function openWin(id){
  document.getElementById(id).style.display="block";
}
function closeWin(id){
  document.getElementById(id).style.display="none";
}

// 
const files = [
"01001000", // 
"01001100", // 
"01010000", // 
"01000101"  // 
];

// 打开文件
function openFile(i){
  document.getElementById("contentWin").style.display="block";
  document.getElementById("contentText").innerText = files[i];
}

// 显示提示
function showContent(type){
  document.getElementById("contentWin").style.display="block";

  if(type==="order"){
    document.getElementById("contentText").innerText="4-2-1-3";
  }

  if(type==="tip"){
    document.getElementById("contentText").innerText=
    "解谜游戏中，常见方法是将二进制转换为16进制或10进制，从而得到隐藏信息。";
  }
}

// 打开密码输入
function openPass(){
  document.getElementById("passBox").style.display="block";
}

// 输入逻辑
const inputs = document.querySelectorAll(".pass");

inputs.forEach((e,i)=>{
  e.addEventListener("input",()=>{
    if(e.value && i<3){
      inputs[i+1].focus();
    }
    check();
  });
});

// 
function check(){
  const v = Array.from(inputs).map(i=>i.value).join("").toUpperCase();
  const ans = atob("SEVMUA=="); // 

  if(v.length===4){
    if(v===ans){
      document.body.style.opacity="0";
      setTimeout(()=>{
        location.href="page3.html";
      },800);
    } else {
      inputs.forEach(i=>i.value="");
      inputs[0].focus();
    }
  }
}

</script>

</body>
</html>
