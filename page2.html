<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>桌面</title>

<style>
body{
  margin:0;
  background: linear-gradient(#87ceeb,#4fa3d1);
  font-family: "Segoe UI";
}

/* 桌面图标 */
.icon{
  width:80px;
  text-align:center;
  margin:20px;
  cursor:pointer;
  color:#000;
}

/* 窗口 */
.window{
  position:absolute;
  width:600px;
  height:350px;
  background:#fff;
  border:1px solid #aaa;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  display:none;
}

/* 居中 */
.center{
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* 标题栏 */
.titlebar{
  height:35px;
  background:#f3f3f3;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  border-bottom:1px solid #ddd;
}

.close{
  cursor:pointer;
  font-size:18px;
}

/* 内容区 */
.content{
  padding:10px;
  height:300px;
  overflow:auto;
}

/* 文件列表 */
.file{
  padding:5px;
  cursor:pointer;
}

.file:hover{
  background:#e6f2ff;
}

/* 图标 */
.file::before{
  content:"📄 ";
}
.folder::before{
  content:"📁 ";
}

/* 任务栏 */
#taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  align-items:center;
  padding-left:10px;
}

#search{
  width:200px;
  padding:5px;
  background:#000;
  color:#fff;
  border:1px solid #555;
}

/* 密码框 */
#passBox{
  display:none;
  position:absolute;
  bottom:60px;
  left:20px;
  background:#111;
  padding:10px;
  border:1px solid #555;
  color:#fff;
}

.pass{
  width:30px;
  text-align:center;
  margin:2px;
}
</style>
</head>

<body>

<!-- 桌面 -->
<div class="icon" onclick="openWin('folderWin')">📁<br>文件夹</div>
<div class="icon" onclick="openWin('trashWin')">🗑️<br>回收站</div>
<div class="icon" onclick="openWin('noteWin')">📝<br>笔记</div>

<!-- 文件夹窗口 -->
<div id="folderWin" class="window center">
  <div class="titlebar">
    文件夹
    <span class="close" onclick="closeWin('folderWin')">×</span>
  </div>
  <div class="content">
    <div class="file" onclick="openFile(0)">data_1.txt</div>
    <div class="file" onclick="openFile(1)">data_2.txt</div>
    <div class="file" onclick="openFile(2)">data_3.txt</div>
    <div class="file" onclick="openFile(3)">data_4.txt</div>
  </div>
</div>

<!-- 回收站 -->
<div id="trashWin" class="window center">
  <div class="titlebar">
    回收站
    <span class="close" onclick="closeWin('trashWin')">×</span>
  </div>
  <div class="content">
    <div class="file" onclick="showText('order')">system.log</div>
  </div>
</div>

<!-- 笔记 -->
<div id="noteWin" class="window center">
  <div class="titlebar">
    笔记
    <span class="close" onclick="closeWin('noteWin')">×</span>
  </div>
  <div class="content">
    <div class="file" onclick="showText('tip')">readme.txt</div>
  </div>
</div>

<!-- 文档窗口 -->
<div id="docWin" class="window center">
  <div class="titlebar">
    文档
    <span class="close" onclick="closeWin('docWin')">×</span>
  </div>
  <div id="docText" class="content"></div>
</div>

<!-- 任务栏 -->
<div id="taskbar">
  <input id="search" placeholder="搜索..." onclick="openPass()">
</div>

<!-- 密码 -->
<div id="passBox">
  <div>请输入密码</div>
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <div style="font-size:12px;color:#aaa;">提示：一个单词</div>
</div>

<script>

// 窗口控制
function openWin(id){
  document.getElementById(id).style.display="block";
}
function closeWin(id){
  document.getElementById(id).style.display="none";
}

// 数据（二进制）
const files=[
"01001000",
"01001100",
"01010000",
"01000101"
];

// 打开文件
function openFile(i){
  openWin("docWin");
  document.getElementById("docText").innerText=files[i];
}

// 显示文本
function showText(type){
  openWin("docWin");

  if(type==="order"){
    docText.innerText="4-2-1-3";
  }

  if(type==="tip"){
    docText.innerText="解谜游戏中，常见方法是将二进制转换为16进制或10进制，从而得到隐藏信息。";
  }
}

// 打开密码
function openPass(){
  passBox.style.display="block";
}

// 输入逻辑
const inputs=document.querySelectorAll(".pass");

inputs.forEach((e,i)=>{
  e.addEventListener("input",()=>{
    if(e.value && i<3) inputs[i+1].focus();
    check();
  });
});

// 验证
function check(){
  const v=Array.from(inputs).map(i=>i.value).join("").toUpperCase();
  const ans=atob("SEVMUA==");

  if(v.length===4){
    if(v===ans){
      document.body.style.opacity="0";
      setTimeout(()=>location.href="page3.html",800);
    }else{
      inputs.forEach(i=>i.value="");
      inputs[0].focus();
    }
  }
}

</script>

</body>
</html>
