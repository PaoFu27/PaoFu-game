<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>桌面 - 第二关</title>
<style>
/* 全局设置 */
body {
  margin: 0;
  padding: 0;
  background: #4fa3d1;
  font-family: "Segoe UI", sans-serif;
  user-select: none;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* --- 1. 左上角图标 (竖向排列) --- */
.icon-container {
  position: absolute;
  top: 30px;
  left: 30px;
  display: flex;
  flex-direction: column; /* 强制竖向排列 */
  gap: 20px; /* 图标之间的间距 */
  z-index: 10;
}

.icon {
  width: 90px;
  text-align: center;
  cursor: pointer;
  color: #000;
  padding: 10px;
  border-radius: 8px;
  transition: background 0.2s;
}

.icon:hover {
  background: rgba(255, 255, 255, 0.3);
}

.icon span {
  display: block;
  font-size: 42px;
  margin-bottom: 5px;
}

.icon div {
  font-size: 15px;
  text-shadow: 0 1px 2px rgba(255,255,255,0.5);
}

/* --- 2. 普通窗口 (居中) --- */
.window {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 350px;
  background: #fff;
  border: 1px solid #ccc;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: none;
  z-index: 900;
  border-radius: 6px;
  flex-direction: column;
  overflow: hidden;
}

.titlebar {
  height: 35px;
  background: #f0f0f0;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 15px;
  font-weight: bold;
}

.close {
  cursor: pointer;
  font-size: 20px;
  padding: 0 5px;
}
.close:hover { color: red; }

.content {
  padding: 15px;
  overflow: auto;
  flex: 1;
}

.file {
  padding: 8px;
  cursor: pointer;
  border-radius: 4px;
}
.file:hover { background: #e6f2ff; }
.file::before { content: "📄 "; }

/* --- 3. 任务栏 & 密码框 --- */
#taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: #222;
  display: flex;
  align-items: center;
  padding-left: 15px;
  z-index: 1000;
}

#search {
  padding: 6px 10px;
  border-radius: 4px;
  border: none;
  background: #333;
  color: #fff;
  width: 200px;
  cursor: pointer;
}

#passBox {
  display: none;
  position: fixed;
  bottom: 50px;
  left: 20px;
  background: #111;
  color: #fff;
  padding: 15px;
  border-radius: 6px;
  z-index: 1001;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.pass {
  width: 30px;
  height: 30px;
  text-align: center;
  font-size: 18px;
  margin: 0 2px;
  border: none;
  border-radius: 4px;
  background: #444;
  color: #fff;
}

/* --- 4. 【重点修改】救小黄决策框 (大幅变大) --- */
#saveXiaoHuangModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  z-index: 2000;
  /* 使用 Flex 居中内部内容 */
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}

.modal-content {
  background: #fff;
  /* 关键：强制增加尺寸 */
  width: 600px; 
  max-width: 90%;
  padding: 50px 40px; /* 大幅增加内边距，不再拥挤 */
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: popIn 0.3s ease-out;
}

@keyframes popIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-content h2 {
  margin: 0 0 20px 0;
  font-size: 28px;
  color: #333;
}

.modal-content p {
  font-size: 18px;
  color: #555;
  line-height: 1.6;
  margin-bottom: 30px;
}

.modal-btn-group {
  display: flex;
  justify-content: center;
  gap: 30px; /* 按钮之间的大间距 */
}

.modal-btn {
  padding: 15px 40px; /* 大按钮 */
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: #fff;
  font-weight: bold;
  transition: transform 0.1s;
}

.modal-btn:active { transform: scale(0.95); }
.btn-save { background: #2ecc71; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
.btn-not-save { background: #e74c3c; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }

/* --- 5. 【重点修改】失望提示 (层级更高，不关闭父级) --- */
#disappointedTip {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  /* 注意：这里不使用 transform 覆盖父级，而是独立定位 */
  transform: translate(-50%, -50%); 
  background: rgba(0, 0, 0, 0.85);
  color: #fff;
  padding: 30px 50px;
  border-radius: 10px;
  font-size: 22px;
  z-index: 2005; /* 必须比 modal (2000) 高，显示在最上面 */
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  pointer-events: none; /* 让点击事件穿透它，防止误触关闭逻辑复杂化 */
}

/* 动画 */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
}
.flash { animation: flashAnim 0.1s 10; }
@keyframes flashAnim { 50% { opacity: 0.5; } }

</style>
</head>
<body>

<!-- 图标区域 -->
<div class="icon-container">
  <div class="icon" onclick="openWin('folderWin')"><span>📁</span><div>文件夹</div></div>
  <div class="icon" onclick="openWin('trashWin')"><span>🗑️</span><div>回收站</div></div>
  <div class="icon" onclick="openWin('noteWin')"><span>📝</span><div>笔记</div></div>
</div>

<!-- 窗口模板 -->
<div id="folderWin" class="window"><div class="titlebar">文件夹<span class="close" onclick="closeWin('folderWin')">×</span></div><div class="content"><div class="file" onclick="openFile(0)">data_1.txt</div><div class="file" onclick="openFile(1)">data_2.txt</div><div class="file" onclick="openFile(2)">data_3.txt</div><div class="file" onclick="openFile(3)">data_4.txt</div></div></div>
<div id="trashWin" class="window"><div class="titlebar">回收站<span class="close" onclick="closeWin('trashWin')">×</span></div><div class="content"><div class="file" onclick="showText('order')">system.log</div></div></div>
<div id="noteWin" class="window"><div class="titlebar">笔记<span class="close" onclick="closeWin('noteWin')">×</span></div><div class="content"><div class="file" onclick="showText('tip')">readme.txt</div></div></div>
<div id="docWin" class="window"><div class="titlebar">文档<span class="close" onclick="closeWin('docWin')">×</span></div><div id="docText" class="content"></div></div>

<!-- 任务栏 -->
<div id="taskbar"><input id="search" placeholder="搜索..." readonly></div>

<!-- 密码框 -->
<div id="passBox">
  密码：<br>
  <div style="margin-top:5px;">
    <input class="pass" maxlength="1"><input class="pass" maxlength="1"><input class="pass" maxlength="1"><input class="pass" maxlength="1">
  </div>
  <div style="font-size:12px;color:#aaa;margin-top:5px;">提示：一个单词</div>
</div>

<!-- 邮件弹窗 -->
<div id="mailAlert" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:30px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.3); text-align:center; z-index:1002;">
  <h3>新邮件!</h3>
  <div style="font-size:50px; cursor:pointer;" onclick="location.href='mail.html'">📧</div>
</div>

<!-- 【核心】救小黄决策框 (已放大) -->
<div id="saveXiaoHuangModal">
  <div class="modal-content">
    <h2>⚠️ 紧急抉择</h2>
    <p>系统检测到“小黄”被困在数据深处。<br>你是否要消耗算力救出它？</p>
    <div class="modal-btn-group">
      <!-- 点击救：跳转 -->
      <button class="modal-btn btn-save" onclick="doSave()">🦸 立即救援</button>
      <!-- 点击不救：显示失望，但不关闭此框 -->
      <button class="modal-btn btn-not-save" onclick="doNotSave()">❌ 放弃救援</button>
    </div>
  </div>
</div>

<!-- 失望提示 (浮动在最上层) -->
<div id="disappointedTip">
  😞 小黄失望地看着你...<br>
  <span style="font-size:14px; color:#ccc; margin-top:10px; display:block;">(点击任意处消除此提示)</span>
</div>

<script>
// 窗口逻辑
function openWin(id) { document.getElementById(id).style.display = 'flex'; }
function closeWin(id) { document.getElementById(id).style.display = 'none'; }

// 文件逻辑
const files = ["01001000","01001100","01010000","01000101"];
function openFile(i) { openWin('docWin'); document.getElementById('docText').innerText = files[i]; }
function showText(t) { openWin('docWin'); document.getElementById('docText').innerText = t==='order' ? "4-2-1-3" : "二进制转ASCII"; }

// 密码逻辑
const inputs = document.querySelectorAll('.pass');
document.getElementById('search').onclick = (e) => { e.stopPropagation(); document.getElementById('passBox').style.display='block'; inputs[0].focus(); };
document.onclick = () => document.getElementById('passBox').style.display='none';
inputs.forEach((inp, i) => {
  inp.onclick = e => e.stopPropagation();
  inp.oninput = () => { if(inp.value) { inp.value=inp.value[0].toUpperCase(); if(i<3) inputs[i+1].focus(); checkPass(); } };
  inp.onkeydown = e => { if(e.key=='Backspace' && !inp.value && i>0) inputs[i-1].focus(); };
});

function checkPass() {
  let val = Array.from(inputs).map(i=>i.value).join('');
  if(val.length===4) {
    if(val === "HELP") {
      document.body.classList.add('flash');
      setTimeout(()=>{ document.body.classList.remove('flash'); document.getElementById('mailAlert').style.display='block'; }, 500);
    } else {
      document.getElementById('passBox').style.animation = 'shake 0.3s';
      setTimeout(()=>{ document.getElementById('passBox').style.animation=''; inputs.forEach(i=>i.value=''); inputs[0].focus(); }, 300);
    }
  }
}

// =======================
// 【核心修改】剧情逻辑
// =======================

// 点击“救” -> 直接跳转
function doSave() {
  console.log("Saving...");
  location.href = "level2.html";
}

// 点击“不救” -> 显示失望提示，【绝对不关闭】主框
function doNotSave() {
  const tip = document.getElementById('disappointedTip');
  tip.style.display = 'block';
  
  // 逻辑：点击页面任意位置，只关闭“失望提示”，不关闭“主框”
  const closeTipHandler = (e) => {
    // 如果点击的是主框里的按钮，不要关闭提示（避免冲突），其他情况关闭
    if (!e.target.closest('.modal-btn')) {
      tip.style.display = 'none';
      document.removeEventListener('click', closeTipHandler);
    }
  };
  
  // 稍微延迟绑定，防止本次点击按钮的事件冒泡立即触发关闭
  setTimeout(() => {
    document.addEventListener('click', closeTipHandler);
  }, 50);
}

// 初始化
window.onload = () => {
  if(new URLSearchParams(window.location.search).get('fromPublic') === 'true') {
    document.getElementById('saveXiaoHuangModal').style.display = 'flex';
  }
};
</script>
</body>
</html>
