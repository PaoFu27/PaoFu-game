<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>桌面</title>

<style>
body{
  margin:0;
  background:#4fa3d1; /* 纯蓝 */
  font-family:Segoe UI;
  overflow:hidden;
}

/* 图标 */
.icon{
  margin:20px;
  cursor:pointer;
  color:#000;
}

/* 窗口 */
.window{
  position:absolute;
  width:600px;
  height:350px;
  background:#fff;
  border:1px solid #aaa;
  display:none;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* 标题栏 */
.titlebar{
  height:35px;
  background:#f3f3f3;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
}

.close{cursor:pointer;}

.content{padding:10px;}

/* 任务栏 */
#taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  align-items:center;
  padding-left:10px;
}

#search{
  width:200px;
}

/* 密码框 */
#passBox{
  display:none;
  position:absolute;
  bottom:60px;
  left:20px;
  background:#111;
  color:#fff;
  padding:10px;
}

/* 抖动 */
@keyframes shake{
  0%{transform:translate(0)}
  25%{transform:translate(5px)}
  50%{transform:translate(-5px)}
  75%{transform:translate(5px)}
  100%{transform:translate(0)}
}

/* 闪烁 */
.flash{
  animation:flash 0.1s 10;
}
@keyframes flash{
  0%{opacity:1}
  50%{opacity:0}
  100%{opacity:1}
}

/* 邮件弹窗 */
#mailAlert{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  border:1px solid #000;
  text-align:center;
}
</style>
</head>

<body>

<div class="icon" id="icons">📁 文件夹</div>

<div id="taskbar">
  <input id="search" placeholder="搜索...">
</div>

<div id="passBox">
  输入密码：
  <input class="p" maxlength="1">
  <input class="p" maxlength="1">
  <input class="p" maxlength="1">
  <input class="p" maxlength="1">
</div>

<div id="mailAlert">
  <p>你收到一封邮件</p>
  <div onclick="goMail()" style="cursor:pointer;font-size:30px;">📧</div>
</div>

<script>

// 搜索逻辑
const search=document.getElementById("search");
const box=document.getElementById("passBox");

search.onclick=(e)=>{
  e.stopPropagation();
  box.style.display="block";
};

// 点击其他地方关闭
document.onclick=()=>{
  box.style.display="none";
};

// 输入
const inputs=document.querySelectorAll(".p");

inputs.forEach((e,i)=>{
  e.onclick=(ev)=>ev.stopPropagation();
  e.oninput=()=>{
    if(e.value && i<3) inputs[i+1].focus();
    check();
  }
});

function check(){
  let v=[...inputs].map(i=>i.value).join("").toUpperCase();
  let ans=atob("SEVMUA==");

  if(v.length===4){
    if(v===ans){
      triggerEffect();
    }else{
      inputs.forEach(i=>i.value="");
    }
  }
}

// 特效
function triggerEffect(){

  // 抖动
  document.getElementById("icons").style.animation="shake 0.5s";

  // 闪屏
  document.body.classList.add("flash");

  setTimeout(()=>{
    document.getElementById("mailAlert").style.display="block";
  },800);
}

// 跳邮件
function goMail(){
  location.href="mail.html";
}

</script>

</body>
</html>
