<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>桌面</title>
<style>
/* 全局设置 */
body {
  margin: 0;
  padding: 0;
  background: #4fa3d1;
  font-family: "Segoe UI", sans-serif;
  user-select: none;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

.icon-container {
  position: absolute;
  top: 30px;
  left: 30px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  z-index: 10;
}

.icon {
  width: 90px;
  text-align: center;
  cursor: pointer;
  color: #000;
  padding: 10px;
  border-radius: 8px;
  transition: background 0.2s;
}

.icon:hover {
  background: rgba(255, 255, 255, 0.3);
}

.icon span {
  display: block;
  font-size: 42px;
  margin-bottom: 5px;
}

.icon div {
  font-size: 15px;
  text-shadow: 0 1px 2px rgba(255,255,255,0.5);
}

.window {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 350px;
  background: #fff;
  border: 1px solid #ccc;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: none;
  z-index: 900;
  border-radius: 6px;
  flex-direction: column;
  overflow: hidden;
}

.titlebar {
  height: 35px;
  background: #f0f0f0;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 15px;
  font-weight: bold;
}

.close {
  cursor: pointer;
  font-size: 20px;
  padding: 0 5px;
}
.close:hover { color: red; }

.content {
  padding: 15px;
  overflow: auto;
  flex: 1;
}

.file {
  padding: 8px;
  cursor: pointer;
  border-radius: 4px;
}
.file:hover { background: #e6f2ff; }
.file::before { content: "📄 "; }

#taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: #222;
  display: flex;
  align-items: center;
  padding-left: 15px;
  z-index: 1000;
}

#search {
  padding: 6px 10px;
  border-radius: 4px;
  border: none;
  background: #333;
  color: #fff;
  width: 200px;
  cursor: pointer;
}

#passBox {
  display: none;
  position: fixed;
  bottom: 50px;
  left: 20px;
  background: #111;
  color: #fff;
  padding: 15px;
  border-radius: 6px;
  z-index: 1001;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.pass {
  width: 30px;
  height: 30px;
  text-align: center;
  font-size: 18px;
  margin: 0 2px;
  border: none;
  border-radius: 4px;
  background: #444;
  color: #fff;
}

#saveXiaoHuangModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.6);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}

.modal-content {
  background: #fff;
  width: 600px; 
  max-width: 90%;
  padding: 50px 40px; 
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: popIn 0.3s ease-out;
}

@keyframes popIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-content h2 {
  margin: 0 0 20px 0;
  font-size: 28px;
  color: #333;
}

.modal-content p {
  font-size: 18px;
  color: #555;
  line-height: 1.6;
  margin-bottom: 30px;
}

.modal-btn-group {
  display: flex;
  justify-content: center;
  gap: 30px;
}

.modal-btn {
  padding: 15px 40px; 
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: #fff;
  font-weight: bold;
  transition: transform 0.1s;
}

.modal-btn:active { transform: scale(0.95); }
.btn-save { background: #2ecc71; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
.btn-not-save { background: #e74c3c; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); }

#disappointedTip {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%); 
  background: rgba(0, 0, 0, 0.85);
  color: #fff;
  padding: 30px 50px;
  border-radius: 10px;
  font-size: 22px;
  z-index: 2005; 
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  pointer-events: none; 
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
}
.flash { animation: flashAnim 0.1s 10; }
@keyframes flashAnim { 50% { opacity: 0.5; } }

</style>
</head>
<body>

<!-- 图标区域 -->
<div class="icon-container">
  <div class="icon" onclick="openWin('folderWin')"><span>📁</span><div>文件夹</div></div>
  <div class="icon" onclick="openWin('trashWin')"><span>🗑️</span><div>回收站</div></div>
  <div class="icon" onclick="openWin('noteWin')"><span>📝</span><div>笔记</div></div>
</div>

<div id="folderWin" class="window"><div class="titlebar">文件夹<span class="close" onclick="closeWin('folderWin')">×</span></div><div class="content"><div class="file" onclick="openFile(0)">data_1.txt</div><div class="file" onclick="openFile(1)">data_2.txt</div><div class="file" onclick="openFile(2)">data_3.txt</div><div class="file" onclick="openFile(3)">data_4.txt</div></div></div>
<div id="trashWin" class="window"><div class="titlebar">回收站<span class="close" onclick="closeWin('trashWin')">×</span></div><div class="content"><div class="file" onclick="showText('order')">system.log</div></div></div>
<div id="noteWin" class="window"><div class="titlebar">笔记<span class="close" onclick="closeWin('noteWin')">×</span></div><div class="content"><div class="file" onclick="showText('tip')">readme.txt</div></div></div>
<div id="docWin" class="window"><div class="titlebar">文档<span class="close" onclick="closeWin('docWin')">×</span></div><div id="docText" class="content"></div></div>

<div id="taskbar"><input id="search" placeholder="搜索..." readonly></div>

<div id="passBox">
  密码：<br>
  <div style="margin-top:5px;">
    <input class="pass" maxlength="1"><input class="pass" maxlength="1"><input class="pass" maxlength="1"><input class="pass" maxlength="1">
  </div>
  <div style="font-size:12px;color:#aaa;margin-top:5px;">提示：英文字母</div>
</div>

<div id="mailAlert" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:30px; border-radius:10px; box-shadow:0 10px 30px rgba(0,0,0,0.3); text-align:center; z-index:1002;">
  <h3>新邮件!</h3>
  <div style="font-size:50px; cursor:pointer;" onclick="location.href='mail.html'">📧</div>
</div>

<div id="saveXiaoHuangModal">
  <div class="modal-content">
    <h2>⚠️ 紧急抉择</h2>
    <p>系统检测到“小黄”被困在数据深处。<br>你是否要消耗算力救出它？</p>
    <div class="modal-btn-group">
      <button class="modal-btn btn-save" onclick="doSave()">🦸 立即救援</button>
      <button class="modal-btn btn-not-save" onclick="doNotSave()">❌ 放弃救援</button>
    </div>
  </div>
</div>

<div id="disappointedTip">
  😞 小黄失望地看着你...<br>
  <span style="font-size:14px; color:#ccc; margin-top:10px; display:block;"></span>
</div>

<script>
function openWin(id) { document.getElementById(id).style.display = 'flex'; }
function closeWin(id) { document.getElementById(id).style.display = 'none'; }

const files = ["01001000","01001100","01010000","01000101"];
function openFile(i) { openWin('docWin'); document.getElementById('docText').innerText = files[i]; }
function showText(t) { openWin('docWin'); document.getElementById('docText').innerText = t==='order' ? "4-2-1-3" 
  : `以下是一些常见的解谜方法：
<p>字母和数字的利用：通过将数字转换为字母或进行移位来解决问题，例如将数字转换为对应的字母。</p>
<p>编码和解码：使用编码（如Base64）和解码方法来处理谜题中的信息。</p>
<p>游戏设计中的谜题：分析游戏中的谜题设计，了解谜题的目标和逻辑。</p>
<p>解谜工具和方法：使用各种解谜工具和方法来辅助解决谜题。</p>
<p>逻辑推理：通过逻辑推理和逻辑游戏来提高解谜能力。</p>
<p>这些方法可以帮助你更有效地解决各种谜题</p>`; 
}

const inputs = document.querySelectorAll('.pass');

document.getElementById('search').onclick = (e) => { 
  e.stopPropagation(); 
  document.getElementById('passBox').style.display='block'; 
  inputs[0].focus(); 
};

document.onclick = () => document.getElementById('passBox').style.display='none';

inputs.forEach((inp, i) => {
  inp.onclick = e => e.stopPropagation();
  inp.oninput = () => { 
    if(inp.value) { 
      inp.value = inp.value[0].toUpperCase();
      if(i < 3) inputs[i+1].focus(); 
      checkPass(); 
    } 
  };
  inp.onkeydown = e => { 
    if(e.key === 'Backspace' && !inp.value && i > 0) inputs[i-1].focus(); 
  };
});

function checkPass() {
  let val = Array.from(inputs).map(i => i.value).join('');
  
 if(val.length === 4) {
    const encryptedTarget = [85, 82, 89, 93]; 
    const offset = 13;

    let inputCodes = val.split('').map(char => char.charCodeAt(0));

    let isCorrect = true;
    for(let k=0; k<4; k++) {
      if(inputCodes[k] + offset !== encryptedTarget[k]) {
        isCorrect = false;
        break;
      }
    }

    if(isCorrect) {
      document.body.classList.add('flash');
      setTimeout(() => { 
        document.body.classList.remove('flash'); 
        document.getElementById('passBox').style.display = 'none';
        document.getElementById('mailAlert').style.display = 'block'; 
      }, 500);
    } else {
      const box = document.getElementById('passBox');
      box.style.animation = 'shake 0.3s';
      setTimeout(() => { 
        box.style.animation = ''; 
        inputs.forEach(i => i.value = ''); 
        inputs[0].focus(); 
      }, 300);
    }
  }
}


function doSave() {
  console.log("Saving...");
  location.href = "page3.html";
}

function doNotSave() {
  const tip = document.getElementById('disappointedTip');
  tip.style.display = 'block';
  
  const closeTipHandler = (e) => {
    if (!e.target.closest('.modal-btn')) {
      tip.style.display = 'none';
      document.removeEventListener('click', closeTipHandler);
    }
  };
  
  setTimeout(() => {
    document.addEventListener('click', closeTipHandler);
  }, 50);
}

window.onload = () => {
  if(new URLSearchParams(window.location.search).get('fromPublic') === 'true') {
    document.getElementById('saveXiaoHuangModal').style.display = 'flex';
  }
};
</script>
</body>
</html>
