<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>桌面</title>

<style>
body{
  margin:0;
  background:#4fa3d1;
  font-family:Segoe UI;
  user-select:none;
}

/* 桌面图标 */
.icon{
  width:80px;
  text-align:center;
  margin:20px;
  cursor:pointer;
  color:#000;
}

/* 窗口 */
.window{
  position:absolute;
  width:600px;
  height:350px;
  background:#fff;
  border:1px solid #aaa;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  display:none;

  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  z-index:999;   /* ✅ 核心修复 */
}
  
/* 标题栏 */
.titlebar{
  height:35px;
  background:#f3f3f3;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10px;
  border-bottom:1px solid #ddd;
}

.close{
  cursor:pointer;
}

/* 内容 */
.content{
  padding:10px;
  height:300px;
  overflow:auto;
}

.file{
  padding:5px;
  cursor:pointer;
}
.file:hover{background:#e6f2ff;}
.file::before{content:"📄 ";}

/* 任务栏 */
#taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  align-items:center;
  padding-left:10px;
}

#search{
  width:200px;
  padding:5px;
}

/* 密码框 */
#passBox{
  display:none;
  position:absolute;
  bottom:60px;
  left:20px;
  background:#111;
  color:#fff;
  padding:10px;
}

.pass{
  width:30px;
  margin:2px;
  text-align:center;
}

/* 抖动 */
@keyframes shake{
  0%{transform:translate(0)}
  25%{transform:translate(5px)}
  50%{transform:translate(-5px)}
  75%{transform:translate(5px)}
  100%{transform:translate(0)}
}

/* 闪烁 */
.flash{
  animation:flash 0.1s 10;
}
@keyframes flash{
  0%{opacity:1}
  50%{opacity:0}
  100%{opacity:1}
}

/* 邮件弹窗 */
#mailAlert{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  padding:20px;
  border:1px solid #000;
  text-align:center;
}
</style>
</head>

<body>

<!-- 图标 -->
<div class="icon" onclick="openWin('folderWin')">📁<br>文件夹</div>
<div class="icon" onclick="openWin('trashWin')">🗑️<br>回收站</div>
<div class="icon" onclick="openWin('noteWin')">📝<br>笔记</div>

<!-- 文件夹 -->
<div id="folderWin" class="window">
  <div class="titlebar">
    文件夹
    <span class="close" onclick="closeWin('folderWin')">×</span>
  </div>
  <div class="content">
    <div class="file" onclick="openFile(0)">data_1.txt</div>
    <div class="file" onclick="openFile(1)">data_2.txt</div>
    <div class="file" onclick="openFile(2)">data_3.txt</div>
    <div class="file" onclick="openFile(3)">data_4.txt</div>
  </div>
</div>

<!-- 回收站 -->
<div id="trashWin" class="window">
  <div class="titlebar">
    回收站
    <span class="close" onclick="closeWin('trashWin')">×</span>
  </div>
  <div class="content">
    <div class="file" onclick="showText('order')">system.log</div>
  </div>
</div>

<!-- 笔记 -->
<div id="noteWin" class="window">
  <div class="titlebar">
    笔记
    <span class="close" onclick="closeWin('noteWin')">×</span>
  </div>
  <div class="content">
    <div class="file" onclick="showText('tip')">readme.txt</div>
  </div>
</div>

<!-- 文档 -->
<div id="docWin" class="window">
  <div class="titlebar">
    文档
    <span class="close" onclick="closeWin('docWin')">×</span>
  </div>
  <div id="docText" class="content"></div>
</div>

<!-- 任务栏 -->
<div id="taskbar">
  <input id="search" placeholder="搜索...">
</div>

<!-- 密码框 -->
<div id="passBox">
  输入密码：
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <div style="font-size:12px;color:#aaa;">提示：一个单词</div>
</div>

<!-- 邮件弹窗 -->
<div id="mailAlert">
  <p>你收到一封邮件</p>
  <div style="font-size:40px;cursor:pointer;" onclick="location.href='mail.html'">📧</div>
</div>

<script>

// 窗口
function openWin(id){
  document.getElementById(id).style.display="block";
}
function closeWin(id){
  document.getElementById(id).style.display="none";
}

// 文件数据
const files=[
"01001000",
"01001100",
"01010000",
"01000101"
];

// 打开文件
function openFile(i){
  openWin("docWin");
  document.getElementById("docText").innerText=files[i];
}

// 文本
function showText(type){
  openWin("docWin");

  if(type==="order"){
    docText.innerText="4-2-1-3";
  }
  if(type==="tip"){
    docText.innerText="解谜游戏中，常见方法是将二进制转换为16进制或10进制，从而得到隐藏信息。";
  }
}

// 搜索逻辑
const search=document.getElementById("search");
const passBox=document.getElementById("passBox");

search.addEventListener("click",(e)=>{
  e.stopPropagation();
  passBox.style.display="block";
});

// 点击外面关闭
document.addEventListener("click",()=>{
  passBox.style.display="none";
});

// 输入框阻止关闭
document.querySelectorAll(".pass").forEach((el,i)=>{
  el.addEventListener("click",(e)=>e.stopPropagation());
  el.addEventListener("input",()=>{
    if(el.value && i<3){
      document.querySelectorAll(".pass")[i+1].focus();
    }
    check();
  });
});

// 验证
function check(){
  let v=[...document.querySelectorAll(".pass")].map(i=>i.value).join("").toUpperCase();
  let ans=atob("SEVMUA==");

  if(v.length===4){
    if(v===ans){
      triggerEffect();
    }else{
      document.querySelectorAll(".pass").forEach(i=>i.value="");
    }
  }
}

// 特效
function triggerEffect(){

  // 图标抖动
  document.querySelectorAll(".icon").forEach(i=>{
    i.style.animation="shake 0.5s";
  });

  // 闪屏
  document.body.classList.add("flash");

  setTimeout(()=>{
    document.getElementById("mailAlert").style.display="block";
  },800);
}

</script>

</body>
</html>
