<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>桌面</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  font-family:Segoe UI;
  color:#fff;
}

/* 桌面图标 */
.icon{
  width:80px;
  text-align:center;
  cursor:pointer;
  margin:20px;
}

.desktop{
  display:flex;
  flex-direction:column;
  width:100px;
}

/* 窗口 */
.window{
  position:absolute;
  top:100px;
  left:200px;
  width:400px;
  background:#111;
  border:1px solid #444;
  display:none;
  padding:10px;
}

.title{
  border-bottom:1px solid #444;
  margin-bottom:10px;
}

/* 搜索栏 */
#taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:40px;
  background:#111;
  display:flex;
  align-items:center;
  padding-left:10px;
}

#search{
  width:200px;
  padding:5px;
  background:#000;
  border:1px solid #555;
  color:#fff;
}

/* 密码输入 */
#passBox{
  display:none;
  position:absolute;
  bottom:60px;
  left:20px;
  background:#111;
  padding:10px;
  border:1px solid #555;
}

.pass{
  width:30px;
  margin:2px;
  text-align:center;
  font-size:20px;
  background:#000;
  border:1px solid #555;
  color:#fff;
}
</style>
</head>

<body>

<div class="desktop">

  <div class="icon" onclick="openWin('folder')">📁<br>文件夹</div>
  <div class="icon" onclick="openWin('trash')">🗑️<br>回收站</div>
  <div class="icon" onclick="openWin('note')">📝<br>笔记</div>

</div>

<!-- 文件夹 -->
<div id="folder" class="window">
  <div class="title">文件夹</div>
  <div onclick="openFile(0)">data_1.txt</div>
  <div onclick="openFile(1)">data_2.txt</div>
  <div onclick="openFile(2)">data_3.txt</div>
  <div onclick="openFile(3)">data_4.txt</div>
</div>

<!-- 回收站 -->
<div id="trash" class="window">
  <div class="title">回收站</div>
  <div onclick="showContent('order')">system.log</div>
</div>

<!-- 笔记 -->
<div id="note" class="window">
  <div class="title">笔记</div>
  <div onclick="showContent('tip')">readme.txt</div>
</div>

<!-- 内容窗口 -->
<div id="content" class="window"></div>

<!-- 任务栏 -->
<div id="taskbar">
  <input id="search" placeholder="搜索..." onclick="openPass()">
</div>

<!-- 密码框 -->
<div id="passBox">
  <div>请输入密码</div>
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <input class="pass" maxlength="1">
  <div style="font-size:12px;color:#888;">提示：一个单词</div>
</div>

<script>

// 打开窗口
function openWin(id){
  document.getElementById(id).style.display="block";
}

// 文件数据（2进制）
const files = [
"01001000",
"01001100",
"01010000",
"01000101"
];

// 打开文件
function openFile(i){
  const c = document.getElementById("content");
  c.style.display="block";
  c.innerText = files[i];
}

// 显示提示
function showContent(type){
  const c = document.getElementById("content");
  c.style.display="block";

  if(type==="order"){
    c.innerText = "4-2-1-3";
  }

  if(type==="tip"){
    c.innerText = "解谜游戏中，常见方法是将二进制转换为16进制或10进制，从而得到隐藏信息。";
  }
}

// 打开密码输入
function openPass(){
  document.getElementById("passBox").style.display="block";
}

// 输入检测
const inputs = document.querySelectorAll(".pass");

inputs.forEach((e,i)=>{
  e.addEventListener("input",()=>{
    if(e.value && i<3){
      inputs[i+1].focus();
    }
    check();
  });
});

// 
function check(){
  const v = Array.from(inputs).map(i=>i.value).join("").toUpperCase();
  const ans = atob("SEVMUA==");

  if(v.length===4){
    if(v===ans){
      document.body.style.opacity="0";
      setTimeout(()=>{
        location.href="page3.html";
      },800);
    } else {
      inputs.forEach(i=>i.value="");
      inputs[0].focus();
    }
  }
}

</script>

</body>
</html>
